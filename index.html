<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0d0f; --accent: #f1c40f; --text: #ffffff; --dim: #8e8e93; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .header-fixed { position: sticky; top: 0; z-index: 1000; background: rgba(11,13,15,0.98); border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); }
        .series-bar, .set-slider { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; }
        .series-tab { padding: 8px 18px; background: #222; border-radius: 40px; font-size: 0.9rem; white-space: nowrap; cursor: pointer; color: var(--dim); }
        .series-tab.active { background: #fff; color: #000; font-weight: bold; }
        .set-icon-card { flex-shrink: 0; width: 85px; text-align: center; cursor: pointer; }
        .set-icon-card img { width: 60px; height: 60px; object-fit: contain; background: #000; border-radius: 12px; padding: 5px; border: 1px solid var(--border); }
        .set-icon-card span { display: block; font-size: 0.65rem; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .main-view { padding: 15px; min-height: 100vh; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 30px 0 10px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 40px; }
        .card-wrap { border-radius: 8px; overflow: hidden; background: #111; aspect-ratio: 250/350; position: relative; }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        #detail-view { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; flex-direction: column; overflow-y: auto; }
        #detail-view.open { display: flex; }
        .footer-nav { position: sticky; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000); display: flex; justify-content: center; gap: 30px; }
        .nav-btn { background: #fff; color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="series-bar" id="series-bar"></div>
    <div class="set-slider" id="set-slider"></div>
</div>

<div class="main-view" id="content-area"></div>

<div id="detail-view">
    <div style="display:flex; justify-content:space-between; padding:20px;">
        <span id="detail-count" style="color:var(--accent); font-weight:bold;"></span>
        <span onclick="closeDetail()" style="font-size:35px; cursor:pointer;">&times;</span>
    </div>
    <div style="padding:20px; display:flex; flex-direction:column; align-items:center;">
        <img id="detail-img" style="width:100%; max-width:350px; border-radius:15px;">
        <h2 id="detail-name" style="margin:20px 0;"></h2>
        <div id="detail-info"></div>
    </div>
    <div class="footer-nav">
        <div class="nav-btn" onclick="prevCard()">◀</div>
        <div class="nav-btn" onclick="nextCard()">▶</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let masterCards = [];
    let currentIdx = 0;

    async function init() {
        const { data: series } = await client.from('series').select('*').order('series');
        const bar = document.getElementById('series-bar');
        
        const allBtn = document.createElement('div');
        allBtn.className = 'series-tab active';
        allBtn.innerText = 'ALL';
        allBtn.onclick = () => { updateActive(allBtn); loadContent(null); };
        bar.appendChild(allBtn);

        series.forEach(s => {
            const t = document.createElement('div');
            t.className = 'series-tab';
            t.innerText = s.series;
            t.onclick = () => { updateActive(t); loadContent(s.series); };
            bar.appendChild(t);
        });
        loadContent(null);
    }

    function updateActive(target) {
        document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
        target.classList.add('active');
    }

    async function loadContent(seriesName) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div style="text-align:center; padding-top:100px;">DB 자동 매칭 중...</div>';
        
        const { data: sets } = await client.from('sets').select('*').eq(seriesName ? 'series' : 'id', seriesName ? seriesName : 'id').order('releaseDate', {ascending: false});
        if(seriesName) { // 위 쿼리 보정
            const { data: filteredSets } = await client.from('sets').select('*').eq('series', seriesName).order('releaseDate', {ascending: false});
            renderSlider(filteredSets);
            await fetchAndRenderCards(filteredSets);
        } else {
            const { data: allSets } = await client.from('sets').select('*').order('releaseDate', {ascending: false});
            renderSlider(allSets);
            await fetchAndRenderCards(allSets);
        }
    }

    function renderSlider(sets) {
        const slider = document.getElementById('set-slider');
        slider.innerHTML = '';
        sets.forEach(s => {
            const div = document.createElement('div');
            div.className = 'set-icon-card';
            div.innerHTML = `<img src="${s.image_logo || s.image_symbol}"><span>${s.name}</span>`;
            div.onclick = () => document.getElementById('sec-' + s.id)?.scrollIntoView({behavior:'smooth'});
            slider.appendChild(div);
        });
    }

    async function fetchAndRenderCards(sets) {
        const area = document.getElementById('content-area');
        const setNames = sets.map(s => s.name);
        
        // [핵심] 컬럼명을 몰라도 모든 데이터를 일단 1개만 가져와서 컬럼 구조 분석
        const { data: sample } = await client.from('cards').select('*').limit(1);
        if(!sample || sample.length === 0) {
            area.innerHTML = '카드 데이터가 없습니다.';
            return;
        }

        // 세트 정보가 들어있을 만한 후보 컬럼들 자동 검색
        const keys = Object.keys(sample[0]);
        const setColumn = keys.find(k => ['set_name', 'set', 'setName', 'series', 'setid'].includes(k.toLowerCase())) || keys[0];

        const { data: cards } = await client.from('cards').select('*').in(setColumn, setNames);
        masterCards = (cards || []).sort((a,b) => (a.number || 0) - (b.number || 0));

        if(masterCards.length === 0) {
            area.innerHTML = `<div style="text-align:center; padding:50px;">
                매칭된 카드가 없습니다.<br><br>
                <small style="color:var(--dim)">분석된 컬럼: ${keys.join(', ')}</small>
            </div>`;
            return;
        }

        area.innerHTML = '';
        sets.forEach(set => {
            const sCards = masterCards.filter(c => c[setColumn] === set.name);
            if(sCards.length === 0) return;

            const sec = document.createElement('div');
            sec.id = 'sec-' + set.id;
            sec.innerHTML = `<div class="section-title">${set.name}</div>`;
            const grid = document.createElement('div');
            grid.className = 'card-grid';
            
            sCards.forEach(card => {
                const gIdx = masterCards.findIndex(c => c.id === card.id);
                const wrap = document.createElement('div');
                wrap.className = 'card-wrap';
                wrap.onclick = () => openDetail(gIdx);
                wrap.innerHTML = `<img src="${card.image_small}" loading="lazy">`;
                grid.appendChild(wrap);
            });
            sec.appendChild(grid);
            area.appendChild(sec);
        });
    }

    function openDetail(idx) {
        currentIdx = idx;
        const card = masterCards[idx];
        document.getElementById('detail-img').src = card.image_large;
        document.getElementById('detail-name').innerText = card.name;
        document.getElementById('detail-count').innerText = `${idx + 1} / ${masterCards.length}`;
        document.getElementById('detail-view').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() { document.getElementById('detail-view').classList.remove('open'); document.body.style.overflow = ''; }
    function nextCard() { if(currentIdx < masterCards.length - 1) openDetail(currentIdx + 1); }
    function prevCard() { if(currentIdx > 0) openDetail(currentIdx - 1); }

    init();
</script>
</body>
</html>
