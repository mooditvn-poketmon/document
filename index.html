<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Dex</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        /* 카드 그리드 설정 */
        .dex-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 카드 개별 스타일 */
        .card-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-align: center;
        }
        .card-item:hover { transform: translateY(-5px); }
        .card-item img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .card-name { font-weight: bold; font-size: 1rem; color: #222; margin: 5px 0; }
        .card-set { font-size: 0.8rem; color: #666; background: #eee; padding: 2px 8px; border-radius: 10px; }
        
        #loading { text-align: center; font-size: 1.2rem; padding: 50px; }
    </style>
</head>
<body>

    <h1>Pokédex 실시간 도감</h1>
    <div id="loading">포켓몬 데이터를 불러오는 중...</div>
    <div class="dex-container" id="dex-container"></div>

    <script>
        const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function loadDex() {
            const container = document.getElementById('dex-container');
            const loading = document.getElementById('loading');

            // DB에서 이미지와 이름, 세트명 가져오기
            const { data, error } = await client
                .from('master_cards')
                .select('name, set_name, image_url_small')
                .order('name', { ascending: true }) // 이름순 정렬
                .limit(50); // 일단 50개만 노출

            if (error) {
                loading.innerText = "❌ 데이터 로드 실패: " + error.message;
                return;
            }

            loading.style.display = 'none';

            data.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item';
                
                // 이미지가 없을 경우를 대비한 기본 처리
                const imgSrc = card.image_url_small || 'https://via.placeholder.com/250x350?text=No+Image';
                
                cardDiv.innerHTML = `
                    <img src="${imgSrc}" alt="${card.name}">
                    <div class="card-name">${card.name}</div>
                    <span class="card-set">${card.set_name}</span>
                `;
                container.appendChild(cardDiv);
            });
        }

        loadDex();
    </script>
</body>
</html>
