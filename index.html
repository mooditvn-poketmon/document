<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0d0f; --accent: #f1c40f; --text: #ffffff; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .header { position: sticky; top: 0; z-index: 1000; background: #0b0d0f; border-bottom: 1px solid var(--border); }
        .series-bar, .set-slider { display: flex; overflow-x: auto; padding: 10px; gap: 10px; scrollbar-width: none; }
        .tab { padding: 8px 15px; background: #222; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 14px; }
        .tab.active { background: #fff; color: #000; font-weight: bold; }
        .set-icon { flex-shrink: 0; width: 70px; text-align: center; cursor: pointer; }
        .set-icon img { width: 50px; height: 50px; object-fit: contain; background: #000; border-radius: 10px; border: 1px solid var(--border); }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .card { background: #111; border-radius: 5px; overflow: hidden; aspect-ratio: 2.5/3.5; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        #detail { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; flex-direction: column; }
        #detail.active { display: flex; }
    </style>
</head>
<body>

<div class="header">
    <div class="series-bar" id="series-bar"></div>
    <div class="set-slider" id="set-slider"></div>
</div>

<div id="content-area"></div>

<div id="detail">
    <div style="padding: 20px; text-align: right; font-size: 30px;" onclick="closeDetail()">&times;</div>
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <img id="detail-img" style="width: 80%; max-width: 350px; border-radius: 15px;">
        <h2 id="detail-name"></h2>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let masterCards = [];

    async function init() {
        const { data: series } = await client.from('series').select('*').order('series');
        const bar = document.getElementById('series-bar');
        
        const allTab = document.createElement('div');
        allTab.className = 'tab active';
        allTab.innerText = 'ALL';
        allTab.onclick = (e) => { switchTab(e.target); loadData(null); };
        bar.appendChild(allTab);

        series.forEach(s => {
            const t = document.createElement('div');
            t.className = 'tab';
            t.innerText = s.series;
            t.onclick = (e) => { switchTab(e.target); loadData(s.series); };
            bar.appendChild(t);
        });
        loadData(null);
    }

    function switchTab(target) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        target.classList.add('active');
    }

    async function loadData(seriesName) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div style="text-align:center; padding:50px;">데이터 매칭 중...</div>';

        // 1. 세트 정보 로드
        let sQ = client.from('sets').select('*');
        if(seriesName) sQ = sQ.eq('series', seriesName);
        const { data: sets } = await sQ;

        // 2. 세트 슬라이더
        const slider = document.getElementById('set-slider');
        slider.innerHTML = '';
        sets.forEach(s => {
            const div = document.createElement('div');
            div.className = 'set-icon';
            div.innerHTML = `<img src="${s.image_logo || s.image_symbol}">`;
            div.onclick = () => document.getElementById('sec-'+s.name.replace(/\s+/g, ''))?.scrollIntoView({behavior:'smooth'});
            slider.appendChild(div);
        });

        // 3. 카드 로드 (set_id가 비어있으므로 set_name 또는 set 컬럼으로 매칭 시도)
        const setNames = sets.map(s => s.name);
        
        // cards 테이블의 'set_name' 또는 'set' 컬럼을 조회 (데이터 구조에 맞게 자동 선택되길 기도하며..)
        const { data: cards, error } = await client.from('cards')
            .select('*')
            .in('set_name', setNames); // 만약 컬럼명이 'set'이면 .in('set', setNames)로 수정 필요

        if(error || !cards || cards.length === 0) {
            // 재시도: 컬럼명이 'set'일 경우
            const { data: retryCards } = await client.from('cards').select('*').in('set', setNames);
            masterCards = retryCards || [];
        } else {
            masterCards = cards;
        }

        area.innerHTML = '';
        if(masterCards.length === 0) {
            area.innerHTML = '<div style="text-align:center; padding:50px;">카드를 찾을 수 없습니다. (DB 컬럼 매칭 실패)</div>';
            return;
        }

        // 4. 렌더링
        sets.forEach(set => {
            // set_name 이나 set 컬럼으로 필터링
            const sCards = masterCards.filter(c => (c.set_name === set.name || c.set === set.name));
            if(sCards.length === 0) return;

            const sec = document.createElement('div');
            sec.id = 'sec-' + set.name.replace(/\s+/g, '');
            sec.innerHTML = `<div style="padding:15px; font-weight:bold; border-bottom:1px solid #222;">${set.name}</div>`;
            const grid = document.createElement('div');
            grid.className = 'card-grid';
            
            sCards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = 'card';
                wrap.onclick = () => openDetail(card);
                wrap.innerHTML = `<img src="${card.image_small}" loading="lazy">`;
                grid.appendChild(wrap);
            });
            sec.appendChild(grid);
            area.appendChild(sec);
        });
    }

    function openDetail(card) {
        document.getElementById('detail-img').src = card.image_large;
        document.getElementById('detail-name').innerText = card.name;
        document.getElementById('detail').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() { document.getElementById('detail').classList.remove('active'); document.body.style.overflow = ''; }

    init();
</script>
</body>
</html>
