<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-silver: #bdc3c7;
            --dark-void: #0b0d0f;
            --card-surface: #16181c;
            --accent-yellow: #f1c40f;
            --text-pure: #ffffff;
            --text-muted: #8e8e93;
            --border-subtle: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-void);
            color: var(--text-pure);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        nav {
            background: rgba(11, 13, 15, 0.98);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(15px);
            padding: 16px 0;
        }

        .series-scroll-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 20px;
            gap: 12px;
        }

        .series-tab {
            display: inline-block;
            padding: 10px 22px;
            background: #1c1f24;
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
        }

        .series-tab.active {
            background: var(--primary-silver);
            color: #000;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }

        .dex-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 10px 20px 50px;
        }

        .card-item {
            background: var(--card-surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }

        .card-item img {
            width: 110px;
            aspect-ratio: 250/350;
            object-fit: contain;
            border-radius: 8px;
            background: #000;
        }

        .card-name { font-size: 1.2rem; font-weight: 700; }
        .card-set-name { font-size: 0.85rem; color: var(--text-muted); }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            background-color: var(--dark-void);
        }

        .modal.open { display: flex; flex-direction: column; }

        .modal-container {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .detail-header-fixed {
            padding: 60px 20px 30px;
            text-align: center;
            background: #16181c;
        }

        .detail-header-fixed img {
            width: 220px;
            border-radius: 12px;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 35px;
            cursor: pointer;
        }

        .section-card {
            background: #1a1d21;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 15px;
        }

        .section-header {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--primary-silver);
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<nav>
    <div class="series-scroll-container" id="series-menu">
        <div class="series-tab active" onclick="changeSeries('ALL', this)">ALL</div>
    </div>
</nav>

<header>
    <h1 id="view-title">POKÉMON ARCHIVE</h1>
</header>

<div class="dex-container" id="dex-container"></div>

<div id="detail-modal" class="modal">
    <div class="modal-container">
        <span class="close-btn" onclick="closeModal()">×</span>

        <div class="detail-header-fixed">
            <img id="detail-img">
        </div>

        <div style="padding:20px;">
            <div id="detail-name" style="font-size:1.8rem;font-weight:800;"></div>
            <div id="detail-set" style="color:#aaa;"></div>
            <div id="detail-content"></div>
        </div>
    </div>
</div>

<script>
const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let currentSeries = "ALL";
let currentPage = 0;
const itemsPerPage = 50;
let allCards = [];
let isLoading = false;

async function init() {

    const { data, error } = await client
        .from("cards")
        .select("series");

    if (error || !data) {
        console.log("series load error:", error);
        return;
    }

    // 안전하게 정리
    const list = [...new Set(
        data
            .map(x => x.series)
            .filter(v => v && v !== null && v !== "")
    )].sort();

    const menu = document.getElementById("series-menu");

    // 기존 ALL 제외하고 중복 방지
    menu.innerHTML = `<div class="series-tab active" onclick="changeSeries('ALL', this)">ALL</div>`;

    list.forEach(s => {
        const div = document.createElement("div");
        div.className = "series-tab";
        div.innerText = s;
        div.onclick = e => changeSeries(s, e.target);
        menu.appendChild(div);
    });
}

function changeSeries(s, el) {
    document.querySelectorAll(".series-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    currentSeries = s;
    currentPage = 0;
    allCards = [];
    document.getElementById("dex-container").innerHTML = "";
    load();
}

async function load() {

    let q = client.from("cards")
        .select("*")
        .order("name", { ascending: true })
        .range(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage - 1);

    if (currentSeries !== "ALL") {
        q = q.eq("series", currentSeries);
    }

    const { data } = await q;

    if (!data || data.length === 0) return;

    allCards = allCards.concat(data);

    render(data);
    currentPage++;
}

function render(list) {

    const box = document.getElementById("dex-container");

    list.forEach(c => {

        const idx = allCards.findIndex(x => x.id === c.id);

        const div = document.createElement("div");
        div.className = "card-item";
        div.onclick = () => open(idx);

        div.innerHTML = `
            <img src="${c.image_small || ''}"
                 onerror="this.src='https://via.placeholder.com/110x154'">
            <div>
                <div class="card-name">${c.name}</div>
                <div class="card-set-name">${c.set_name || ''}</div>
            </div>
        `;

        box.appendChild(div);
    });
}

function open(i) {

    const c = allCards[i];

    document.getElementById("detail-modal").classList.add("open");

    document.getElementById("detail-img").src = c.image_small;
    document.getElementById("detail-name").innerText = c.name;
    document.getElementById("detail-set").innerText = `${c.set_name} / ${c.series}`;

    let html = "";

    html += `
        <div class="section-card">
            <div class="section-header">INFO</div>
            HP: ${c.hp || '-'}<br>
            TYPE: ${(c.card_types || []).join(", ")}<br>
            SUPER: ${c.supertype || ''}
        </div>
    `;

    if (c.attacks?.length) {
        html += `<div class="section-card"><div class="section-header">ATTACKS</div>`;
        c.attacks.forEach(a => {
            html += `<div><b>${a.name}</b> ${a.damage || ''}</div>`;
        });
        html += `</div>`;
    }

    document.getElementById("detail-content").innerHTML = html;
}

function closeModal() {
    document.getElementById("detail-modal").classList.remove("open");
}

init();
</script>

</body>
</html>
