<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DB 연결 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>📡 DB 연결 테스트</h1>
    <div id="status">데이터 요청 중...</div>
    <ul id="card-list"></ul>

    <script>
        const URL = "https://piiyexmbntafddnlszmm.supabase.co";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        const supabaseClient = supabase.createClient(URL, KEY);

        async function testConnection() {
            const listElement = document.getElementById('card-list');
            const statusElement = document.getElementById('status');

            // master_cards 테이블에서 딱 20개만 가져와보기
            const { data, error } = await supabaseClient
                .from('master_cards')
                .select('name, set_name')
                .limit(20);

            if (error) {
                statusElement.innerText = "❌ 에러 발생: " + error.message;
                return;
            }

            if (data && data.length > 0) {
                statusElement.innerText = `✅ 성공! ${data.length}개의 데이터를 찾았습니다.`;
                data.forEach(card => {
                    const li = document.createElement('li');
                    li.innerText = `${card.name} (세트: ${card.set_name})`;
                    listElement.appendChild(li);
                });
            } else {
                statusElement.innerText = "⚠️ 연결은 됐으나 테이블에 데이터가 없습니다.";
            }
        }

        testConnection();
    </script>
</body>
</html>
