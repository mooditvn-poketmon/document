<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0b0d;
            --surface: #111316;
            --surface2: #1a1d22;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --text: #f0f0f0;
            --muted: #6b6f78;
            --dim: #3d4049;
            --accent: #f1c40f;
            --accent-dim: rgba(241,196,15,0.12);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 500;
            background: rgba(10,11,13,0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        /* Platform tabs — EN / JP / TC / Pocket */
        .platform-bar {
            display: flex;
            padding: 12px 14px 0;
            gap: 6px;
        }
        .platform-tab {
            flex: 1;
            padding: 8px 4px 7px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-align: center;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.18s;
            user-select: none;
        }
        .platform-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }
        .platform-tab .plat-icon { display: block; font-size: 1rem; margin-bottom: 2px; }

        /* Series chips */
        .series-bar {
            display: flex;
            overflow-x: auto;
            padding: 10px 14px;
            gap: 7px;
            scrollbar-width: none;
        }
        .series-bar::-webkit-scrollbar { display: none; }
        .series-chip {
            flex-shrink: 0;
            padding: 5px 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 0.76rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
        }
        .series-chip.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Set icon slider — 모두 full opacity, 뷰포트 진입 시 하이라이트만 */
        .set-bar {
            display: flex;
            overflow-x: auto;
            padding: 6px 14px 12px;
            gap: 14px;
            scrollbar-width: none;
        }
        .set-bar::-webkit-scrollbar { display: none; }
        .set-thumb {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: 60px;
            cursor: pointer;
        }
        .set-thumb-img {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            border: 1.5px solid var(--border2);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .set-thumb-img img { width: 38px; height: 38px; object-fit: contain; }
        .set-thumb span {
            font-size: 0.56rem;
            font-weight: 600;
            color: var(--muted);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
            transition: color 0.15s;
        }
        .set-thumb.viewing .set-thumb-img { border-color: var(--accent); }
        .set-thumb.viewing span { color: var(--accent); }

        /* ── MAIN ── */
        .main { padding: 0 0 60px; }

        .section-wrap { margin-bottom: 4px; }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 20px 14px 10px;
        }
        .section-line { width: 3px; height: 17px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
        .section-title { font-size: 0.9rem; font-weight: 800; color: var(--text); letter-spacing: 0.01em; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .set-count-badge {
            font-size: 0.68rem;
            color: var(--muted);
            background: var(--surface2);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ★ 가로 스크롤 카드 행 */
        .card-row {
            display: flex;
            overflow-x: auto;
            padding: 2px 14px 14px;
            gap: 10px;
            scrollbar-width: none;
            scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch;
        }
        .card-row::-webkit-scrollbar { display: none; }
        .card-wrap {
            flex-shrink: 0;
            width: 150px;
            aspect-ratio: 245 / 342;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: var(--surface2);
            border: 1px solid var(--border2);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transition: transform 0.13s;
            scroll-snap-align: start;
        }
        .card-wrap:active { transform: scale(0.96); }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-no {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 0.6rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }
        .card-rarity {
            position: absolute;
            top: 6px;
            left: 6px;
            font-size: 0.56rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 20px;
            background: rgba(0,0,0,0.65);
            color: var(--accent);
            backdrop-filter: blur(4px);
        }

        /* Infinite scroll trigger */
        #load-trigger { height: 1px; }
        .load-status { text-align: center; padding: 18px; font-size: 0.78rem; color: var(--muted); display: none; }

        /* ── DETAIL OVERLAY ── */
        #detail-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 900;
            background: #06080a;
            flex-direction: column;
            overflow: hidden;
        }
        #detail-view.open { display: flex; }

        .detail-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px 8px;
            flex-shrink: 0;
        }
        .detail-counter { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
        .detail-close {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
        }

        /* ★ 카드 상세 좌우 스와이프 */
        .detail-swiper {
            width: 100%;
            flex-shrink: 0;
            height: 44vh;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .detail-swiper::-webkit-scrollbar { display: none; }
        .detail-slide {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
        }
        .detail-slide img {
            height: 40vh;
            max-height: 340px;
            aspect-ratio: 245 / 342;
            object-fit: contain;
            border-radius: 14px;
            filter: drop-shadow(0 10px 22px rgba(0,0,0,0.75));
        }

        .swipe-hint {
            text-align: center;
            font-size: 0.66rem;
            color: var(--dim);
            padding: 5px 0 2px;
            flex-shrink: 0;
            letter-spacing: 0.04em;
        }

        /* Info sheet */
        .info-sheet {
            flex: 1;
            background: #0e1014;
            border-top-left-radius: 22px;
            border-top-right-radius: 22px;
            border-top: 1px solid var(--border2);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 6px;
        }
        .info-inner { padding: 20px 18px 50px; }
        .detail-card-name { font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 6px; letter-spacing: -0.01em; }
        .detail-set-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .info-rows { display: flex; flex-direction: column; }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); flex-shrink: 0; }
        .info-val { font-size: 0.82rem; font-weight: 500; color: var(--text); text-align: right; word-break: break-word; }
        .flavor-box {
            margin-top: 14px;
            padding: 13px 15px;
            background: var(--surface2);
            border-radius: 11px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.65;
            font-style: italic;
        }
        .state-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.85rem; line-height: 1.8; }
    </style>
</head>
<body>

<div class="header">
    <div class="platform-bar" id="platform-bar">
        <div class="platform-tab active" data-plat="en"><span class="plat-icon">🇺🇸</span>EN</div>
        <div class="platform-tab" data-plat="jp"><span class="plat-icon">🇯🇵</span>JP</div>
        <div class="platform-tab" data-plat="tc"><span class="plat-icon">🇹🇼</span>TC</div>
        <div class="platform-tab" data-plat="pocket"><span class="plat-icon">📱</span>Pocket</div>
    </div>
    <div class="series-bar" id="series-bar"></div>
    <div class="set-bar" id="set-bar"></div>
</div>

<div class="main">
    <div id="content-area"></div>
    <div id="load-trigger"></div>
    <div class="load-status" id="load-status">불러오는 중…</div>
</div>

<div id="detail-view">
    <div class="detail-topbar">
        <span class="detail-counter" id="detail-counter"></span>
        <div class="detail-close" onclick="closeDetail()">✕</div>
    </div>
    <div class="detail-swiper" id="detail-swiper"></div>
    <div class="swipe-hint">← 좌우로 넘기세요 →</div>
    <div class="info-sheet">
        <div class="info-inner">
            <div class="detail-card-name" id="detail-name"></div>
            <div class="detail-set-badge" id="detail-set-badge"></div>
            <div class="info-rows" id="detail-rows"></div>
            <div class="flavor-box" id="detail-flavor" style="display:none"></div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://piiyexmbntafddnlszmm.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const CFG = {
    en:     { sets:'en_sets',     cards:'en_cards',     setImg:'set_img_url', setName:'set_name', setFull:'set_full_name', setDate:'release_date', series:'series', cardNum:'card_number', cardImg:'image_url', cardName:'name', rarity:'rarity', hp:'hp', artist:'author', flavor:'flavor_text', supertype:'card_type', regulation:'regulation', setFK:'set_id' },
    jp:     { sets:'jp_sets',     cards:'jp_cards',     setImg:'set_img_url', setName:'set_name', setFull:'set_full_name', setDate:'release_date', series:'series', cardNum:'card_number', cardImg:'image_url', cardName:'name', rarity:'rarity', hp:'hp', artist:'author', flavor:'flavor_text', supertype:'card_type', regulation:'regulation', setFK:'set_id' },
    tc:     { sets:'tc_sets',     cards:'tc_cards',     setImg:'set_img_url', setName:'set_name', setFull:'set_full_name', setDate:'release_date', series:'series', cardNum:'card_number', cardImg:'image_url', cardName:'name', rarity:'rarity', hp:'hp', artist:'author', flavor:'flavor_text', supertype:'card_type', regulation:'regulation', setFK:'set_id' },
    pocket: { sets:'pocket_sets', cards:'pocket_cards', setImg:'set_img_url', setName:'set_name', setFull:'set_full_name', setDate:'release_date', series:'series', cardNum:'card_number', cardImg:'image_url', cardName:'name', rarity:'rarity', hp:'hp', artist:'author', flavor:null, supertype:null, regulation:null, setFK:'set_id' }
};

let curPlat = 'en';
let allSets = [];
let filteredSets = [];
let masterCards = [];
let targetSets = [];
let setIdx = 0;
let offset = 0;
const PAGE = 30;
let hasMore = true;
let loading = false;
let curDetailIdx = 0;
let swiperTimer = null;

async function init() {
    document.querySelectorAll('.platform-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            if (tab.dataset.plat === curPlat) return;
            document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            curPlat = tab.dataset.plat;
            loadPlatform();
        });
    });

    document.getElementById('detail-swiper').addEventListener('scroll', onSwiperScroll, { passive: true });

    setupIntersectionObserver();
    await loadPlatform();
}

async function loadPlatform() {
    const cfg = CFG[curPlat];
    document.getElementById('series-bar').innerHTML = '';
    document.getElementById('set-bar').innerHTML = '';
    document.getElementById('content-area').innerHTML = '<div class="state-msg">불러오는 중…</div>';

    const { data: sets } = await sb.from(cfg.sets).select('*').order(cfg.setDate, { ascending: false });
    allSets = sets || [];
    buildSeriesBar();
    filterBySeries(null);
}

function buildSeriesBar() {
    const cfg = CFG[curPlat];
    const bar = document.getElementById('series-bar');
    bar.innerHTML = '';
    const seriesList = [...new Set(allSets.map(s => s[cfg.series]).filter(Boolean))];
    addChip(bar, 'ALL', true, () => filterBySeries(null));
    seriesList.forEach(s => addChip(bar, s, false, () => filterBySeries(s)));
}

function addChip(bar, label, active, onClick) {
    const el = document.createElement('div');
    el.className = 'series-chip' + (active ? ' active' : '');
    el.textContent = label;
    el.onclick = () => {
        document.querySelectorAll('.series-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        onClick();
    };
    bar.appendChild(el);
}

function filterBySeries(series) {
    const cfg = CFG[curPlat];
    filteredSets = series ? allSets.filter(s => s[cfg.series] === series) : [...allSets];
    buildSetBar();
    resetAndLoad();
}

function buildSetBar() {
    const cfg = CFG[curPlat];
    const bar = document.getElementById('set-bar');
    bar.innerHTML = '';
    filteredSets.forEach(s => {
        const el = document.createElement('div');
        el.className = 'set-thumb';
        el.id = 'thumb-' + s.id;
        const imgUrl = s[cfg.setImg] || '';
        el.innerHTML = `<div class="set-thumb-img"><img src="${imgUrl}" onerror="this.style.display='none'" alt=""></div><span>${s[cfg.setName] || ''}</span>`;
        el.onclick = () => document.getElementById('sec-' + s.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        bar.appendChild(el);
    });
}

function resetAndLoad() {
    masterCards = [];
    targetSets = [...filteredSets];
    setIdx = 0;
    offset = 0;
    hasMore = true;
    loading = false;
    document.getElementById('content-area').innerHTML = '';
    document.getElementById('load-status').style.display = 'none';
    loadNextBatch();
}

async function loadNextBatch() {
    if (loading || !hasMore) return;
    if (setIdx >= targetSets.length) { hasMore = false; return; }

    loading = true;
    document.getElementById('load-status').style.display = 'block';

    const cfg = CFG[curPlat];
    const set = targetSets[setIdx];

    const { data: cards, error } = await sb
        .from(cfg.cards)
        .select('*')
        .eq(cfg.setFK, set.id)
        .order(cfg.cardNum, { ascending: true })
        .range(offset, offset + PAGE - 1);

    if (error || !cards || cards.length === 0) {
        setIdx++; offset = 0;
        loading = false;
        document.getElementById('load-status').style.display = 'none';
        await loadNextBatch();
        return;
    }

    const startIdx = masterCards.length;
    masterCards = masterCards.concat(cards);
    renderCards(set, cards, startIdx);

    offset += cards.length;
    if (cards.length < PAGE) { setIdx++; offset = 0; }

    loading = false;
    document.getElementById('load-status').style.display = 'none';
}

function renderCards(set, cards, startIdx) {
    const cfg = CFG[curPlat];
    const area = document.getElementById('content-area');

    let sec = document.getElementById('sec-' + set.id);
    let row;

    if (!sec) {
        sec = document.createElement('div');
        sec.id = 'sec-' + set.id;
        sec.className = 'section-wrap';

        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML = `
            <div class="section-line"></div>
            <span class="section-title">${set[cfg.setFull] || set[cfg.setName] || 'Unknown'}</span>
            <span class="set-count-badge">${set.total_cards || '?'} cards</span>
        `;
        sec.appendChild(header);

        row = document.createElement('div');
        row.className = 'card-row';
        row.id = 'row-' + set.id;
        sec.appendChild(row);

        area.appendChild(sec);
        observeSection(set.id);
    } else {
        row = document.getElementById('row-' + set.id);
    }

    cards.forEach((card, i) => {
        const gIdx = startIdx + i;
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.onclick = () => openDetail(gIdx);

        const imgUrl = card[cfg.cardImg] || '';
        const rarity = card[cfg.rarity] || '';
        const num = card[cfg.cardNum] || '';

        wrap.innerHTML = `
            <img src="${imgUrl}" loading="lazy" alt="">
            ${rarity ? `<div class="card-rarity">${rarity}</div>` : ''}
            ${num ? `<div class="card-no">${num}</div>` : ''}
        `;
        row.appendChild(wrap);
    });
}

function setupIntersectionObserver() {
    new IntersectionObserver(async (entries) => {
        if (entries[0].isIntersecting && !loading && hasMore) await loadNextBatch();
    }, { rootMargin: '500px' }).observe(document.getElementById('load-trigger'));
}

function observeSection(setId) {
    const el = document.getElementById('sec-' + setId);
    if (!el) return;
    new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                document.querySelectorAll('.set-thumb').forEach(t => t.classList.remove('viewing'));
                const thumb = document.getElementById('thumb-' + setId);
                if (thumb) {
                    thumb.classList.add('viewing');
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }
        });
    }, { threshold: 0.1 }).observe(el);
}

function openDetail(idx) {
    curDetailIdx = idx;
    const cfg = CFG[curPlat];
    const swiper = document.getElementById('detail-swiper');

    swiper.innerHTML = '';
    masterCards.forEach(card => {
        const slide = document.createElement('div');
        slide.className = 'detail-slide';
        slide.innerHTML = `<img src="${card[cfg.cardImg] || ''}" loading="lazy" alt="">`;
        swiper.appendChild(slide);
    });

    // 애니메이션 없이 즉시 해당 카드로 이동
    swiper.style.scrollBehavior = 'auto';
    swiper.scrollLeft = idx * swiper.offsetWidth;
    requestAnimationFrame(() => { swiper.style.scrollBehavior = ''; });

    updateDetailInfo(idx);
    document.getElementById('detail-view').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function onSwiperScroll() {
    if (swiperTimer) clearTimeout(swiperTimer);
    swiperTimer = setTimeout(() => {
        const swiper = document.getElementById('detail-swiper');
        const newIdx = Math.round(swiper.scrollLeft / swiper.offsetWidth);
        if (newIdx !== curDetailIdx && newIdx >= 0 && newIdx < masterCards.length) {
            curDetailIdx = newIdx;
            updateDetailInfo(newIdx);
        }
    }, 80);
}

function updateDetailInfo(idx) {
    const card = masterCards[idx];
    const cfg = CFG[curPlat];

    document.getElementById('detail-counter').textContent = `${idx + 1} / ${masterCards.length}`;
    document.getElementById('detail-name').textContent = card[cfg.cardName] || '이름 없음';

    const set = filteredSets.find(s => s.id === card[cfg.setFK]);
    document.getElementById('detail-set-badge').textContent = set ? (set[cfg.setFull] || set[cfg.setName] || '') : '';

    const rows = [
        ['Number', card[cfg.cardNum]],
        ['HP', card[cfg.hp]],
        ['Rarity', card[cfg.rarity]],
        cfg.supertype  ? ['Type', card[cfg.supertype]]       : null,
        cfg.regulation ? ['Regulation', card[cfg.regulation]]: null,
        card.stage     ? ['Stage', card.stage]               : null,
        (cfg.artist && card[cfg.artist]) ? ['Artist', Array.isArray(card[cfg.artist]) ? card[cfg.artist].join(', ') : card[cfg.artist]] : null,
        card.pokedex_number   ? ['Pokédex No.', '#' + card.pokedex_number] : null,
        card.pokemon_category ? ['Category', card.pokemon_category]        : null,
        card.height           ? ['Height', card.height]                    : null,
        card.weight           ? ['Weight', card.weight]                    : null,
    ].filter(r => r && r[1] !== null && r[1] !== undefined && r[1] !== '');

    document.getElementById('detail-rows').innerHTML = rows.map(([label, val]) =>
        `<div class="info-row"><span class="info-label">${label}</span><span class="info-val">${val}</span></div>`
    ).join('');

    const flavorEl = document.getElementById('detail-flavor');
    const flavorVal = cfg.flavor ? card[cfg.flavor] : null;
    if (flavorVal) { flavorEl.style.display = 'block'; flavorEl.textContent = flavorVal; }
    else { flavorEl.style.display = 'none'; }

    document.querySelector('.info-sheet').scrollTop = 0;
}

function closeDetail() {
    document.getElementById('detail-view').classList.remove('open');
    document.body.style.overflow = '';
}

init();
</script>
</body>
</html>
