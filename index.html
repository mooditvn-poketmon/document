<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-silver: #bdc3c7;
            --dark-bg: #0f1215;
            --card-bg: #1a1d21;
            --accent-glow: rgba(192, 192, 192, 0.2);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--dark-bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* 네비게이션: 모바일 최적화 (아코디언 스타일) */
        nav {
            background: rgba(20, 24, 28, 0.98);
            padding: 12px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
            backdrop-filter: blur(15px);
        }

        .menu-wrapper {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .menu-toggle-btn {
            width: 100%;
            padding: 12px 20px;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            color: var(--primary-silver);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .category-menu {
            display: none; 
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px; 
            overflow-y: auto; 
            background: #1a1d21;
            border: 1px solid #444;
            border-radius: 12px;
            margin-top: 8px;
            padding: 8px;
            z-index: 101;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .category-menu.active {
            display: block;
        }

        .menu-item {
            padding: 14px 15px;
            border-radius: 8px;
            transition: all 0.2s;
            text-align: left;
            color: #bbb;
            font-size: 0.9rem;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
        }

        .menu-item:last-child { border-bottom: none; }

        .menu-item:hover, .menu-item.active {
            background: var(--primary-silver);
            color: #000;
            font-weight: bold;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        h1 { 
            font-size: 1.6rem; 
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* 카드 그리드 */
        .dex-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 카드 스타일 */
        .card-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-silver);
        }

        .card-item img {
            width: 100%;
            aspect-ratio: 250/350;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #000;
        }

        .card-name { font-weight: 500; color: #fff; margin-bottom: 5px; font-size: 0.85rem; height: 2.4em; overflow: hidden; }
        .card-set-badge {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.07);
            padding: 2px 6px;
            border-radius: 4px;
            color: #888;
        }

        #loading { text-align: center; padding: 100px; color: #666; font-size: 0.9rem; }

        /* 스크롤바 커스텀 */
        .category-menu::-webkit-scrollbar { width: 6px; }
        .category-menu::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="menu-wrapper">
            <div class="menu-toggle-btn" onclick="toggleMenu()">
                <span id="current-series">모든 시리즈 (ALL)</span>
                <span id="arrow">▼</span>
            </div>
            <div class="category-menu" id="category-menu">
                <div class="menu-item active" onclick="filterData('ALL', this)">ALL SERIES</div>
            </div>
        </div>
    </nav>

    <header>
        <h1 id="view-title">POKÉMON DATABASE</h1>
    </header>

    <div id="loading">데이터를 정밀 동기화 중입니다...</div>
    <div class="dex-container" id="dex-container"></div>

    <script>
        const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let allCards = [];

        async function init() {
            const { data, error } = await client
                .from('master_cards')
                .select('name, series, set_name, image_url_small')
                .order('series', { ascending: true })
                .order('name', { ascending: true });

            if (error) {
                document.getElementById('loading').innerText = "로드 실패: " + error.message;
                return;
            }

            allCards = data;
            createMenu();
            renderCards(allCards);
            document.getElementById('loading').style.display = 'none';
        }

        function toggleMenu() {
            const menu = document.getElementById('category-menu');
            const arrow = document.getElementById('arrow');
            const isActive = menu.classList.toggle('active');
            arrow.innerText = isActive ? '▲' : '▼';
        }

        function createMenu() {
            const menu = document.getElementById('category-menu');
            const seriesList = [...new Set(allCards.map(c => c.series))].filter(s => s).sort();
            
            seriesList.forEach(series => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerText = series;
                item.onclick = (e) => {
                    e.stopPropagation();
                    filterData(series, item);
                };
                menu.appendChild(item);
            });
        }

        function filterData(series, element) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('current-series').innerText = series === 'ALL' ? '모든 시리즈 (ALL)' : series;
            document.getElementById('view-title').innerText = series === 'ALL' ? 'POKÉMON DATABASE' : series;
            
            document.getElementById('category-menu').classList.remove('active');
            document.getElementById('arrow').innerText = '▼';

            const filtered = series === 'ALL' ? allCards : allCards.filter(c => c.series === series);
            renderCards(filtered);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCards(cards) {
            const container = document.getElementById('dex-container');
            container.innerHTML = '';

            const fragment = document.createDocumentFragment();
            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item';
                const imgSrc = card.image_url_small || 'https://via.placeholder.com/250x350/1a1d21/ffffff?text=No+Image';
                
                cardDiv.innerHTML = `
                    <img src="${imgSrc}" loading="lazy" alt="${card.name}">
                    <div class="card-name">${card.name}</div>
                    <div class="card-set-badge">${card.set_name}</div>
                `;
                fragment.appendChild(cardDiv);
            });
            container.appendChild(fragment);
        }

        // 바깥쪽 클릭 시 메뉴 닫기
        window.onclick = function(event) {
            if (!event.target.matches('.menu-toggle-btn') && !event.target.matches('.menu-toggle-btn *')) {
                const menu = document.getElementById('category-menu');
                if (menu.classList.contains('active')) {
                    menu.classList.remove('active');
                    document.getElementById('arrow').innerText = '▼';
                }
            }
        }

        init();
    </script>
</body>
</html>
