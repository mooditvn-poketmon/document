<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-silver: #bdc3c7;
            --dark-void: #0b0d0f;
            --card-surface: #16181c;
            --accent-yellow: #f1c40f;
            --text-pure: #ffffff;
            --text-muted: #8e8e93;
            --border-subtle: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-void);
            color: var(--text-pure);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* 상단 메뉴 */
        nav {
            background: rgba(11, 13, 15, 0.98);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(15px);
            padding: 16px 0;
        }

        .series-scroll-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 20px;
            gap: 12px;
        }

        .series-scroll-container::-webkit-scrollbar { display: none; }

        .series-tab {
            display: inline-block;
            padding: 10px 22px;
            background: #1c1f24;
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .series-tab.active {
            background: var(--primary-silver);
            color: #000;
            border-color: #fff;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }

        /* 리스트 뷰 */
        .dex-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 10px 20px 50px;
        }

        .card-item {
            background: var(--card-surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }

        .card-item img {
            width: 110px;
            height: auto;
            aspect-ratio: 250/350;
            object-fit: contain;
            border-radius: 8px;
            background: #000;
        }

        .card-info-summary {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin: 0; }
        .card-set-name { font-size: 0.85rem; color: var(--text-muted); }

        /* 상세 모달 (배경 완전 차단) */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; 
            width: 100vw; height: 100vh;
            background-color: var(--dark-void);
        }

        .modal.open { display: flex; flex-direction: column; }

        .modal-container {
            display: flex;
            flex-direction: column;
            width: 100%; height: 100%;
            max-width: 500px; margin: 0 auto;
            background: var(--dark-void);
        }

        .detail-header-fixed {
            flex-shrink: 0;
            padding: 60px 20px 30px;
            text-align: center;
            background: #16181c;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .detail-header-fixed img {
            width: 220px;
            border-radius: 12px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 35px; color: #fff;
            cursor: pointer; z-index: 10001;
        }

        .detail-scroll-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 24px 80px;
        }

        .section-card {
            background: #1a1d21;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 15px;
            border: 1px solid var(--border-subtle);
        }

        .section-header { font-size: 0.8rem; font-weight: 800; color: var(--primary-silver); text-transform: uppercase; margin-bottom: 15px; }
        .move-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #2a2a2a; }
        .move-item:last-child { border-bottom: none; }
        .move-name { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .move-desc { font-size: 0.9rem; color: #bbb; line-height: 1.5; }

        /* 로딩바 */
        #loading-indicator { text-align: center; padding: 20px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav>
    <div class="series-scroll-container" id="series-menu">
        <div class="series-tab active" onclick="changeSeries('ALL', this)">ALL</div>
    </div>
</nav>

<header>
    <h1 id="view-title">POKÉMON ARCHIVE</h1>
</header>

<div class="dex-container" id="dex-container"></div>
<div id="loading-indicator">데이터 로드 중...</div>

<div id="detail-modal" class="modal">
    <div class="modal-container">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="detail-header-fixed"><img id="detail-img" src="" alt="Card"></div>
        <div class="detail-scroll-body" id="detail-scroll-body">
            <div id="detail-title-area" style="text-align:center; margin-bottom:30px;">
                <div class="detail-name" id="detail-name" style="font-size:1.8rem; font-weight:800;"></div>
                <div class="detail-set" id="detail-set" style="color:var(--text-muted); font-size:0.95rem;"></div>
            </div>
            <div id="detail-content-target"></div>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentSeries = 'ALL';
    let currentPage = 0;
    const itemsPerPage = 50;
    let isFetching = false;
    let hasMore = true;
    let allLoadedCards = [];

    async function init() {
        const { data: seriesData } = await client.from('master_cards').select('series').not('series', 'is', null);
        const uniqueSeries = [...new Set(seriesData.map(s => s.series))].sort();
        const menu = document.getElementById('series-menu');
        uniqueSeries.forEach(s => {
            const tab = document.createElement('div');
            tab.className = 'series-tab';
            tab.innerText = s;
            tab.onclick = (e) => changeSeries(s, e.target);
            menu.appendChild(tab);
        });
        fetchNextPage();
    }

    function changeSeries(series, element) {
        document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('view-title').innerText = series === 'ALL' ? 'POKÉMON ARCHIVE' : series;
        
        currentSeries = series;
        currentPage = 0;
        hasMore = true;
        allLoadedCards = [];
        document.getElementById('dex-container').innerHTML = '';
        fetchNextPage();
        element.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }

    async function fetchNextPage() {
        if (isFetching || !hasMore) return;
        isFetching = true;
        document.getElementById('loading-indicator').style.display = 'block';

        let query = client.from('master_cards').select('*')
            .order('name', { ascending: true })
            .range(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage - 1);

        if (currentSeries !== 'ALL') {
            query = query.eq('series', currentSeries);
        }

        const { data, error } = await query;

        if (data && data.length > 0) {
            allLoadedCards = [...allLoadedCards, ...data];
            renderCards(data);
            currentPage++;
            if (data.length < itemsPerPage) hasMore = false;
        } else {
            hasMore = false;
        }

        isFetching = false;
        document.getElementById('loading-indicator').style.display = hasMore ? 'block' : 'none';
    }

    function renderCards(newCards) {
        const container = document.getElementById('dex-container');
        newCards.forEach((card) => {
            const idx = allLoadedCards.findIndex(c => c.id === card.id);
            const div = document.createElement('div');
            div.className = 'card-item';
            div.onclick = () => openModal(idx);
            div.innerHTML = `
                <img src="${card.image_url_large}" loading="lazy">
                <div class="card-info-summary">
                    <div class="card-name">${card.name}</div>
                    <div class="card-set-name">${card.set_name}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // 무한 스크롤 감지
    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
            fetchNextPage();
        }
    });

    function openModal(idx) {
        const card = allLoadedCards[idx];
        document.getElementById('detail-scroll-body').scrollTop = 0;
        document.getElementById('detail-img').src = card.image_url_large;
        document.getElementById('detail-name').innerText = card.name;
        document.getElementById('detail-set').innerText = `${card.set_name} / ${card.set_id.toUpperCase()}`;
        
        let html = '';
        html += `<div class="section-card"><div class="section-header">Stats</div><div style="font-weight:bold; color:var(--accent-yellow);">${card.hp ? card.hp + ' HP' : ''} ${card.types ? ' / ' + card.types.join(', ') : ''}</div></div>`;
        if (card.abilities) {
            html += `<div class="section-card"><div class="section-header">Abilities</div>`;
            card.abilities.forEach(a => html += `<div class="move-item"><div class="move-name">${a.name}</div><div class="move-desc">${a.text}</div></div>`);
            html += `</div>`;
        }
        if (card.attacks) {
            html += `<div class="section-card"><div class="section-header">Attacks</div>`;
            card.attacks.forEach(a => html += `<div class="move-item"><div class="move-name">${a.name} ${a.damage ? `(${a.damage})` : ''}</div><div class="move-desc">${a.text || ''}</div></div>`);
            html += `</div>`;
        }
        if (card.flavor_text) {
            html += `<div class="section-card"><div class="section-header">Pokedex</div><div style="font-style:italic; color:#aaa; font-size:0.9rem;">${card.flavor_text}</div></div>`;
        }
        document.getElementById('detail-content-target').innerHTML = html;
        document.getElementById('detail-modal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('detail-modal').classList.remove('open');
        document.body.style.overflow = '';
    }

    init();
</script>
</body>
</html>
