<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT TCG MASTER VIEW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dark-bg: #0b0d0f; --panel-bg: #16181c; --accent: #f1c40f;
            --text: #ffffff; --text-dim: #8e8e93; --border: rgba(255,255,255,0.1);
        }
        body { background: var(--dark-bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* 상단 고정 헤더 영역 (2단 배치) */
        header { flex-shrink: 0; border-bottom: 1px solid var(--border); background: rgba(11,13,15,0.95); backdrop-filter: blur(10px); }
        
        .filter-row { display: flex; align-items: center; padding: 10px 20px; gap: 15px; border-bottom: 1px solid var(--border); }
        .row-label { font-size: 0.7rem; font-weight: 800; color: var(--accent); min-width: 50px; text-transform: uppercase; }
        
        .scroll-container { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; flex: 1; }
        .scroll-container::-webkit-scrollbar { display: none; }

        .item-tab { padding: 6px 16px; background: #222; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; color: var(--text-dim); transition: 0.2s; }
        .item-tab.active { background: var(--text); color: #000; font-weight: bold; border-color: #fff; }
        .set-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* 메인 카드 영역 */
        main { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .card-item { position: relative; transition: transform 0.2s; cursor: pointer; }
        .card-item:hover { transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 250/350; object-fit: cover; border-radius: 10px; background: #111; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-info { font-size: 0.75rem; margin-top: 5px; text-align: center; color: var(--text-dim); }

        /* 상세 모달 */
        .modal { display: none; position: fixed; z-index: 2000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.9); padding: 40px 20px; }
        .modal.open { display: flex; justify-content: center; align-items: center; }
        .modal-content { max-width: 400px; width: 100%; text-align: center; }
        .modal-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="filter-row">
        <div class="row-label">Series</div>
        <div class="scroll-container" id="series-list"></div>
    </div>
    <div class="filter-row">
        <div class="row-label">Sets</div>
        <div class="scroll-container" id="set-list"></div>
    </div>
</header>

<main>
    <div class="card-grid" id="main-grid">
        </div>
</main>

<div id="card-modal" class="modal" onclick="closeModal()">
    <div class="modal-content">
        <img id="modal-img" class="modal-img" src="">
        <h2 id="modal-name"></h2>
        <p id="modal-desc" style="color:var(--text-dim);"></p>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        const { data: series } = await client.from('series').select('*').order('series');
        const container = document.getElementById('series-list');
        
        series.forEach((s, idx) => {
            const tab = document.createElement('div');
            tab.className = `item-tab ${idx === 0 ? 'active' : ''}`;
            tab.innerText = s.series;
            tab.onclick = () => {
                document.querySelectorAll('#series-list .item-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadSets(s.series);
            };
            container.appendChild(tab);
            if(idx === 0) loadSets(s.series);
        });
    }

    // 2단 영역: 세트 목록 로드
    async function loadSets(seriesName) {
        const { data: sets } = await client.from('sets').select('*').eq('series', seriesName).order('releaseDate', {ascending: false});
        const container = document.getElementById('set-list');
        container.innerHTML = '';

        sets.forEach((s, idx) => {
            const tab = document.createElement('div');
            tab.className = `item-tab set-tab ${idx === 0 ? 'active' : ''}`;
            tab.innerText = s.name;
            tab.onclick = () => {
                document.querySelectorAll('.set-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadCards(s.id);
            };
            container.appendChild(tab);
            if(idx === 0) loadCards(s.id);
        });
    }

    // 메인 영역: 개별 카드 로드 (image_small 활용)
    async function loadCards(setId) {
        const { data: cards } = await client.from('cards').select('*').eq('set_id', setId).order('number', {ascending: true});
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';

        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'card-item';
            div.onclick = (e) => { e.stopPropagation(); openModal(c); };
            div.innerHTML = `
                <img class="card-img" src="${c.image_small}" loading="lazy">
                <div class="card-info">#${c.number} ${c.name}</div>
            `;
            grid.appendChild(div);
        });
    }

    function openModal(card) {
        document.getElementById('modal-img').src = card.image_large;
        document.getElementById('modal-name').innerText = card.name;
        document.getElementById('modal-desc').innerText = `${card.supertype} - ${card.rarity || ''}`;
        document.getElementById('card-modal').classList.add('open');
    }

    function closeModal() { document.getElementById('card-modal').classList.remove('open'); }

    init();
</script>
</body>
</html>
