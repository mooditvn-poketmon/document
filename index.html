<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0b0d;
            --surface: #111316;
            --surface2: #1a1d22;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --text: #f0f0f0;
            --muted: #6b6f78;
            --dim: #3d4049;
            --accent: #f1c40f;
            --accent-dim: rgba(241,196,15,0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 500;
            background: rgba(10,11,13,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        /* Platform tabs (EN / TC / JP / Pocket) */
        .platform-bar {
            display: flex;
            padding: 14px 16px 0;
            gap: 6px;
        }
        .platform-tab {
            flex: 1;
            padding: 8px 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-align: center;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.18s;
            user-select: none;
        }
        .platform-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }
        .platform-tab .plat-icon { display: block; font-size: 1.1rem; margin-bottom: 2px; }

        /* Series scroll */
        .series-bar {
            display: flex;
            overflow-x: auto;
            padding: 10px 16px;
            gap: 8px;
            scrollbar-width: none;
        }
        .series-bar::-webkit-scrollbar { display: none; }
        .series-chip {
            flex-shrink: 0;
            padding: 5px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
        }
        .series-chip.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Set icon slider */
        .set-bar {
            display: flex;
            overflow-x: auto;
            padding: 8px 16px 12px;
            gap: 12px;
            scrollbar-width: none;
        }
        .set-bar::-webkit-scrollbar { display: none; }
        .set-card {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: 64px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.15s;
        }
        .set-card.active { opacity: 1; }
        .set-card-img-wrap {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 1.5px solid var(--border2);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .set-card.active .set-card-img-wrap { border-color: var(--accent); }
        .set-card-img-wrap img { width: 40px; height: 40px; object-fit: contain; }
        .set-card span {
            font-size: 0.58rem;
            font-weight: 600;
            color: var(--muted);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }
        .set-card.active span { color: var(--accent); }

        /* ── MAIN ── */
        .main { padding: 8px 14px 60px; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0 12px;
        }
        .section-header-line {
            width: 3px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }
        .section-header h2 {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 0.01em;
        }
        .section-header .set-count {
            margin-left: auto;
            font-size: 0.72rem;
            color: var(--muted);
            background: var(--surface2);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Card grid — single column centered */
        .card-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .card-wrap {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 245 / 342;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            background: var(--surface2);
            border: 1px solid var(--border2);
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card-wrap:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-wrap .card-no {
            position: absolute;
            bottom: 8px;
            right: 10px;
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            letter-spacing: 0.05em;
        }
        .card-rarity-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            color: var(--accent);
            letter-spacing: 0.05em;
            backdrop-filter: blur(4px);
        }

        /* Placeholder shimmer */
        .shimmer {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 245 / 342;
            border-radius: 14px;
            background: linear-gradient(90deg, var(--surface2) 25%, #222428 50%, var(--surface2) 75%);
            background-size: 400% 100%;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { 0% { background-position: 100% 0 } 100% { background-position: -100% 0 } }

        /* Infinite scroll trigger */
        #load-trigger {
            height: 1px;
            margin-top: 20px;
        }
        .load-status {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* ── DETAIL OVERLAY ── */
        #detail-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 900;
            background: #06080a;
            flex-direction: column;
            overflow: hidden;
        }
        #detail-view.open { display: flex; }

        .detail-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            flex-shrink: 0;
        }
        .detail-counter {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.03em;
        }
        .detail-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text);
            line-height: 1;
        }

        /* Swiper */
        .swiper-wrap {
            width: 100%;
            flex-shrink: 0;
            height: 44vh;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .swiper-wrap::-webkit-scrollbar { display: none; }
        .swiper-slide {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
        }
        .swiper-slide img {
            height: 40vh;
            max-height: 340px;
            aspect-ratio: 245 / 342;
            object-fit: contain;
            border-radius: 14px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7));
        }

        /* Info sheet */
        .info-sheet {
            flex: 1;
            background: #0e1014;
            border-top-left-radius: 22px;
            border-top-right-radius: 22px;
            border-top: 1px solid var(--border2);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .info-sheet-inner { padding: 22px 20px 50px; }
        .info-card-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .info-set-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 18px;
        }
        .info-rows { display: flex; flex-direction: column; }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            flex-shrink: 0;
        }
        .info-val {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            text-align: right;
            word-break: break-word;
        }
        .flavor-box {
            margin-top: 16px;
            padding: 14px 16px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.65;
            font-style: italic;
        }

        /* Empty / error states */
        .state-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.7;
        }
        .state-msg strong { display: block; font-size: 1.5rem; margin-bottom: 8px; color: var(--dim); }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
    <div class="platform-bar" id="platform-bar">
        <div class="platform-tab active" data-plat="en">
            <span class="plat-icon">🇺🇸</span>EN
        </div>
        <div class="platform-tab" data-plat="tc">
            <span class="plat-icon">🇹🇼</span>TC
        </div>
        <div class="platform-tab" data-plat="jp">
            <span class="plat-icon">🇯🇵</span>JP
        </div>
        <div class="platform-tab" data-plat="pocket">
            <span class="plat-icon">📱</span>Pocket
        </div>
    </div>
    <div class="series-bar" id="series-bar"></div>
    <div class="set-bar" id="set-bar"></div>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="main">
    <div id="content-area"></div>
    <div id="load-trigger"></div>
    <div class="load-status" id="load-status" style="display:none">불러오는 중…</div>
</div>

<!-- ── DETAIL OVERLAY ── -->
<div id="detail-view">
    <div class="detail-topbar">
        <span class="detail-counter" id="detail-counter"></span>
        <div class="detail-close" onclick="closeDetail()">✕</div>
    </div>
    <div class="swiper-wrap" id="swiper-wrap" onscroll="onSwiperScroll()"></div>
    <div class="info-sheet">
        <div class="info-sheet-inner">
            <div class="info-card-name" id="detail-name"></div>
            <div class="info-set-badge" id="detail-set-badge"></div>
            <div class="info-rows" id="detail-rows"></div>
            <div id="detail-flavor" style="display:none" class="flavor-box"></div>
        </div>
    </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────
const SB_URL = "https://piiyexmbntafddnlszmm.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// Platform → table names
const PLAT_CFG = {
    en:     { sets: 'en_sets',     cards: 'en_cards',     setImg: 'set_img_url', setName: 'set_name', setFull: 'set_full_name', setDate: 'release_date', series: 'series', cardNum: 'card_number', cardImg: 'image_url', cardName: 'name', rarity: 'rarity', hp: 'hp', artist: 'author', flavor: 'flavor_text', supertype: 'card_type', regulation: 'regulation', setFK: 'set_id' },
    tc:     { sets: 'tc_sets',     cards: 'tc_cards',     setImg: 'set_img_url', setName: 'set_name', setFull: 'set_full_name', setDate: 'release_date', series: 'series', cardNum: 'card_number', cardImg: 'image_url', cardName: 'name', rarity: 'rarity', hp: 'hp', artist: 'author', flavor: 'flavor_text', supertype: 'card_type', regulation: 'regulation', setFK: 'set_id' },
    jp:     { sets: 'jp_sets',     cards: 'jp_cards',     setImg: 'set_img_url', setName: 'set_name', setFull: 'set_full_name', setDate: 'release_date', series: 'series', cardNum: 'card_number', cardImg: 'image_url', cardName: 'name', rarity: 'rarity', hp: 'hp', artist: 'author', flavor: 'flavor_text', supertype: 'card_type', regulation: 'regulation', setFK: 'set_id' },
    pocket: { sets: 'pocket_sets', cards: 'pocket_cards', setImg: 'set_img_url', setName: 'set_name', setFull: 'set_full_name', setDate: 'release_date', series: 'series', cardNum: 'card_number', cardImg: 'image_url', cardName: 'name', rarity: 'rarity', hp: 'hp', artist: 'author', flavor: null, supertype: null, regulation: null, setFK: 'set_id' }
};

// ── STATE ───────────────────────────────────────────
let curPlat = 'en';
let curSeries = null;   // null = ALL
let allSets = [];
let filteredSets = [];
let masterCards = [];
let curDetailIdx = 0;

// paging
let targetSets = [];
let setIdx = 0;
let offset = 0;
const PAGE = 20;
let hasMore = true;
let loading = false;

// ── INIT ────────────────────────────────────────────
async function init() {
    setupPlatTabs();
    await loadPlatform('en');
    setupIntersectionObserver();
}

function setupPlatTabs() {
    document.querySelectorAll('.platform-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            if (tab.dataset.plat === curPlat) return;
            document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            curPlat = tab.dataset.plat;
            loadPlatform(curPlat);
        });
    });
}

async function loadPlatform(plat) {
    const cfg = PLAT_CFG[plat];
    document.getElementById('series-bar').innerHTML = '';
    document.getElementById('set-bar').innerHTML = '';
    document.getElementById('content-area').innerHTML = '<div class="state-msg">불러오는 중…</div>';

    const { data: sets } = await sb.from(cfg.sets).select('*').order(cfg.setDate, { ascending: false });
    allSets = sets || [];

    buildSeriesBar(allSets, cfg);
    filterBySeries(null);
}

function buildSeriesBar(sets, cfg) {
    const bar = document.getElementById('series-bar');
    bar.innerHTML = '';

    const seriesList = [...new Set(sets.map(s => s[cfg.series]).filter(Boolean))];

    const allChip = mkChip('ALL', true, () => filterBySeries(null));
    bar.appendChild(allChip);

    seriesList.forEach(s => {
        const chip = mkChip(s, false, () => filterBySeries(s));
        bar.appendChild(chip);
    });
}

function mkChip(label, active, onClick) {
    const el = document.createElement('div');
    el.className = 'series-chip' + (active ? ' active' : '');
    el.textContent = label;
    el.onclick = () => {
        document.querySelectorAll('.series-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        onClick();
    };
    return el;
}

function filterBySeries(series) {
    curSeries = series;
    const cfg = PLAT_CFG[curPlat];
    filteredSets = series ? allSets.filter(s => s[cfg.series] === series) : [...allSets];
    buildSetBar(filteredSets, cfg);
    resetAndLoad(filteredSets);
}

function buildSetBar(sets, cfg) {
    const bar = document.getElementById('set-bar');
    bar.innerHTML = '';
    sets.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'set-card' + (i === 0 ? ' active' : '');
        el.id = 'thumb-' + s.id;
        const imgUrl = s[cfg.setImg] || '';
        el.innerHTML = `<div class="set-card-img-wrap"><img src="${imgUrl}" onerror="this.style.display='none'" alt=""></div><span>${s[cfg.setName] || ''}</span>`;
        el.onclick = () => {
            document.getElementById('sec-' + s.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        bar.appendChild(el);
    });
}

// ── PAGING ENGINE ───────────────────────────────────
function resetAndLoad(sets) {
    masterCards = [];
    targetSets = sets;
    setIdx = 0;
    offset = 0;
    hasMore = true;
    loading = false;
    document.getElementById('content-area').innerHTML = '';
    document.getElementById('load-status').style.display = 'none';
    loadNextBatch();
}

async function loadNextBatch() {
    if (loading || !hasMore) return;
    if (setIdx >= targetSets.length) { hasMore = false; return; }

    loading = true;
    document.getElementById('load-status').style.display = 'block';

    const cfg = PLAT_CFG[curPlat];
    const set = targetSets[setIdx];

    const { data: cards, error } = await sb
        .from(cfg.cards)
        .select('*')
        .eq(cfg.setFK, set.id)
        .order(cfg.cardNum, { ascending: true })
        .range(offset, offset + PAGE - 1);

    if (error || !cards || cards.length === 0) {
        setIdx++;
        offset = 0;
        loading = false;
        document.getElementById('load-status').style.display = 'none';
        await loadNextBatch();
        return;
    }

    masterCards = masterCards.concat(cards);
    renderCards(set, cards);

    offset += cards.length;
    if (cards.length < PAGE) { setIdx++; offset = 0; }

    loading = false;
    document.getElementById('load-status').style.display = 'none';
}

// ── RENDER ──────────────────────────────────────────
function renderCards(set, cards) {
    const cfg = PLAT_CFG[curPlat];
    const area = document.getElementById('content-area');

    let sec = document.getElementById('sec-' + set.id);
    let grid;

    if (!sec) {
        sec = document.createElement('div');
        sec.id = 'sec-' + set.id;

        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML = `
            <div class="section-header-line"></div>
            <h2>${set[cfg.setFull] || set[cfg.setName] || 'Unknown Set'}</h2>
            <span class="set-count">${set.total_cards || '?'} cards</span>
        `;
        sec.appendChild(header);

        grid = document.createElement('div');
        grid.className = 'card-grid';
        grid.id = 'grid-' + set.id;
        sec.appendChild(grid);

        area.appendChild(sec);
        observeSection(set.id);
    } else {
        grid = document.getElementById('grid-' + set.id);
    }

    cards.forEach(card => {
        const gIdx = masterCards.findIndex(c => c.id === card.id);
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.onclick = () => openDetail(gIdx);

        const imgUrl = card[cfg.cardImg] || '';
        const rarity = card[cfg.rarity] || '';
        const num = card[cfg.cardNum] || '';

        wrap.innerHTML = `
            <img src="${imgUrl}" loading="lazy" alt="${card[cfg.cardName] || ''}">
            ${rarity ? `<div class="card-rarity-badge">${rarity}</div>` : ''}
            ${num ? `<div class="card-no">${num}</div>` : ''}
        `;
        grid.appendChild(wrap);
    });
}

// ── INTERSECTION OBSERVERS ───────────────────────────
function setupIntersectionObserver() {
    const trigger = document.getElementById('load-trigger');
    new IntersectionObserver(async (entries) => {
        if (entries[0].isIntersecting && !loading && hasMore) {
            await loadNextBatch();
        }
    }, { rootMargin: '400px' }).observe(trigger);
}

function observeSection(setId) {
    const el = document.getElementById('sec-' + setId);
    if (!el) return;
    new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                document.querySelectorAll('.set-card').forEach(c => c.classList.remove('active'));
                document.getElementById('thumb-' + setId)?.classList.add('active');
                // scroll thumb into view
                const thumb = document.getElementById('thumb-' + setId);
                if (thumb) thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        });
    }, { threshold: 0.05 }).observe(el);
}

// ── DETAIL ──────────────────────────────────────────
function openDetail(idx) {
    curDetailIdx = idx;
    const cfg = PLAT_CFG[curPlat];

    const swiper = document.getElementById('swiper-wrap');
    swiper.innerHTML = '';
    masterCards.forEach(card => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `<img src="${card[cfg.cardImg] || ''}" alt="${card[cfg.cardName] || ''}">`;
        swiper.appendChild(slide);
    });

    swiper.scrollLeft = idx * window.innerWidth;
    updateDetailInfo(idx);

    document.getElementById('detail-view').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function onSwiperScroll() {
    const swiper = document.getElementById('swiper-wrap');
    const newIdx = Math.round(swiper.scrollLeft / window.innerWidth);
    if (newIdx !== curDetailIdx && newIdx >= 0 && newIdx < masterCards.length) {
        curDetailIdx = newIdx;
        updateDetailInfo(newIdx);
    }
}

function updateDetailInfo(idx) {
    const card = masterCards[idx];
    const cfg = PLAT_CFG[curPlat];

    document.getElementById('detail-counter').textContent = `${idx + 1} / ${masterCards.length}`;
    document.getElementById('detail-name').textContent = card[cfg.cardName] || '이름 없음';

    // find set name
    const set = filteredSets.find(s => s.id === card[cfg.setFK]);
    const setLabel = set ? (set[cfg.setFull] || set[cfg.setName] || '') : '';
    document.getElementById('detail-set-badge').textContent = setLabel;

    const rows = [
        ['Number', card[cfg.cardNum]],
        ['HP', card[cfg.hp]],
        ['Rarity', card[cfg.rarity]],
        cfg.supertype ? ['Type', card[cfg.supertype]] : null,
        cfg.regulation ? ['Regulation', card[cfg.regulation]] : null,
        card.stage ? ['Stage', card.stage] : null,
        cfg.artist && card[cfg.artist] ? ['Artist', Array.isArray(card[cfg.artist]) ? card[cfg.artist].join(', ') : card[cfg.artist]] : null,
        card.pokedex_number ? ['Pokédex No.', '#' + card.pokedex_number] : null,
        card.pokemon_category ? ['Category', card.pokemon_category] : null,
        card.height ? ['Height', card.height] : null,
        card.weight ? ['Weight', card.weight] : null,
    ].filter(Boolean).filter(r => r[1] !== null && r[1] !== undefined && r[1] !== '');

    document.getElementById('detail-rows').innerHTML = rows.map(([label, val]) => `
        <div class="info-row">
            <span class="info-label">${label}</span>
            <span class="info-val">${val}</span>
        </div>
    `).join('');

    const flavorEl = document.getElementById('detail-flavor');
    const flavorVal = cfg.flavor ? card[cfg.flavor] : null;
    if (flavorVal) {
        flavorEl.style.display = 'block';
        flavorEl.textContent = flavorVal;
    } else {
        flavorEl.style.display = 'none';
    }

    document.querySelector('.info-sheet').scrollTop = 0;
}

function closeDetail() {
    document.getElementById('detail-view').classList.remove('open');
    document.body.style.overflow = '';
}

// ── START ────────────────────────────────────────────
init();
</script>
</body>
</html>
