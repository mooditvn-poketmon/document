<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0d0f; --accent: #f1c40f; --text: #ffffff; --dim: #8e8e93; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .header-fixed { position: sticky; top: 0; z-index: 1000; background: rgba(11,13,15,0.98); border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); }
        .series-bar, .set-slider { display: flex; overflow-x: auto; padding: 15px; gap: 10px; scrollbar-width: none; }
        .series-bar::-webkit-scrollbar, .set-slider::-webkit-scrollbar { display: none; }
        .series-tab { padding: 8px 18px; background: #222; border-radius: 40px; font-size: 0.9rem; white-space: nowrap; cursor: pointer; color: var(--dim); }
        .series-tab.active { background: #fff; color: #000; font-weight: bold; }
        .set-icon-card { flex-shrink: 0; width: 85px; text-align: center; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
        .set-icon-card.active { opacity: 1; font-weight: bold; }
        .set-icon-card img { width: 60px; height: 60px; object-fit: contain; background: #000; border-radius: 12px; padding: 5px; border: 1px solid var(--border); }
        .set-icon-card.active img { border-color: var(--accent); box-shadow: 0 0 8px rgba(241, 196, 15, 0.4); }
        .set-icon-card span { display: block; font-size: 0.65rem; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .main-view { padding: 15px; min-height: 100vh; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 30px 0 10px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 40px; }
        .card-wrap { border-radius: 8px; overflow: hidden; background: #111; aspect-ratio: 250/350; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        #detail-view { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; flex-direction: column; overflow-y: auto; }
        #detail-view.open { display: flex; }
        .footer-nav { position: sticky; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000); display: flex; justify-content: center; gap: 30px; }
        .nav-btn { background: #fff; color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="series-bar" id="series-bar"></div>
    <div class="set-slider" id="set-slider"></div>
</div>

<div class="main-view" id="content-area"></div>

<div id="detail-view">
    <div style="display:flex; justify-content:space-between; padding:20px;">
        <span id="detail-count" style="color:var(--accent); font-weight:bold;"></span>
        <span onclick="closeDetail()" style="font-size:35px; cursor:pointer; user-select:none;">&times;</span>
    </div>
    <div style="padding:20px; display:flex; flex-direction:column; align-items:center;">
        <img id="detail-img" style="width:100%; max-width:350px; border-radius:15px;">
        <h2 id="detail-name" style="margin:20px 0; text-align:center;"></h2>
        <div id="detail-info" style="color:var(--dim); font-size:0.9rem; text-align:center; line-height:1.5;"></div>
    </div>
    <div class="footer-nav">
        <div class="nav-btn" onclick="prevCard()">◀</div>
        <div class="nav-btn" onclick="nextCard()">▶</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let masterCards = [];
    let currentIdx = 0;

    // 1. 초기 실행: 시리즈 목록 로드
    async function init() {
        // sets 테이블에서 중복 없이 유일한 시리즈 목록을 가져오거나 정렬합니다.
        const { data: setsData, error } = await client.from('sets').select('series').order('series');
        if (error) {
            document.getElementById('content-area').innerText = '시리즈를 불러오지 못했습니다.';
            return;
        }

        // 시리즈 중복 제거
        const uniqueSeries = [...new Set(setsData.map(item => item.series))].filter(Boolean);
        const bar = document.getElementById('series-bar');
        
        // ALL 버튼 배치
        const allBtn = document.createElement('div');
        allBtn.className = 'series-tab active';
        allBtn.innerText = 'ALL';
        allBtn.onclick = () => { updateActiveTab(allBtn); loadSetsAndCards(null); };
        bar.appendChild(allBtn);

        // 각각의 시리즈 탭 추가
        uniqueSeries.forEach(seriesName => {
            const t = document.createElement('div');
            t.className = 'series-tab';
            t.innerText = seriesName;
            t.onclick = () => { updateActiveTab(t); loadSetsAndCards(seriesName); };
            bar.appendChild(t);
        });

        // 최초 진입 시 전체 로드
        loadSetsAndCards(null);
    }

    function updateActiveTab(target) {
        document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
        target.classList.add('active');
    }

    // 2. 선택된 시리즈에 속한 세트 목록 로드 및 카드 연동 핵심 함수
    async function loadSetsAndCards(seriesName) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div style="text-align:center; padding-top:100px; color:var(--dim);">데이터 동기화 중...</div>';
        
        let query = client.from('sets').select('*').order('releaseDate', {ascending: false});
        if (seriesName) {
            query = query.eq('series', seriesName);
        }
        
        const { data: sets, error: setErr } = await query;
        if (setErr || !sets || sets.length === 0) {
            area.innerHTML = '<div style="text-align:center; padding-top:100px; color:var(--dim);">등록된 세트 정보가 없습니다.</div>';
            return;
        }

        renderSlider(sets);
        await fetchAndRenderCards(sets);
    }

    // 3. 상단 슬라이더 바인딩 (set_id 기반으로 작동하도록 타겟 지정)
    function renderSlider(sets) {
        const slider = document.getElementById('set-slider');
        slider.innerHTML = '';
        
        sets.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = `set-icon-card ${idx === 0 ? 'active' : ''}`;
            div.id = 'thumb-' + s.id;
            
            // 이미지 로고 누락 방지 처리
            const imgUrl = s.image_logo || s.image_symbol || 'https://via.placeholder.com/60?text=No+Img';
            div.innerHTML = `<img src="${imgUrl}"><span>${s.name}</span>`;
            
            // 슬라이더 아이콘 클릭 시 해당 set_id 섹션으로 스크롤 이동 및 활성화 마킹
            div.onclick = () => {
                document.querySelectorAll('.set-icon-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                document.getElementById('sec-' + s.id)?.scrollIntoView({behavior:'smooth', block:'center'});
            };
            slider.appendChild(div);
        });
    }

    // 4. [수정 핵심] 정확하게 영인님 DB의 set_id 와 cards 테이블을 매핑하여 하단 출력
    async function fetchAndRenderCards(sets) {
        const area = document.getElementById('content-area');
        const setIds = sets.map(s => s.id);
        
        // 멍청한 유추 로직 삭제 -> 영인님의 실제 영구 스키마 컬럼인 'set_id'로 정확히 쿼리 실행
        const { data: cards, error: cardErr } = await client
            .from('cards')
            .select('*')
            .in('set_id', setIds);

        if (cardErr) {
            area.innerHTML = `<div style="text-align:center; padding:50px; color:red;">카드 로드 오류: ${cardErr.message}</div>`;
            return;
        }

        // 가져온 카드들을 번호(number) 순으로 안전하게 정렬합니다.
        masterCards = (cards || []).sort((a, b) => {
            const numA = parseInt(a.number) || 0;
            const numB = parseInt(b.number) || 0;
            return numA - numB;
        });

        if (masterCards.length === 0) {
            area.innerHTML = `<div style="text-align:center; padding:100px; color:var(--dim)">해당 세트(set_id)에 등록된 카드 데이터가 전부 비어있습니다.</div>`;
            return;
        }

        area.innerHTML = '';
        
        // 화면에 세트별로 구역(Section)을 만들어서 뿌려줍니다.
        sets.forEach(set => {
            // 주입 타겟: 현재 세트의 id와 카드의 set_id 매칭
            const sCards = masterCards.filter(c => c.set_id === set.id);
            if (sCards.length === 0) return; // 카드가 없으면 구역 생성 패스

            const sec = document.createElement('div');
            sec.id = 'sec-' + set.id;
            sec.innerHTML = `<div class="section-title">${set.name} (${sCards.length}장)</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'card-grid';
            
            sCards.forEach(card => {
                const gIdx = masterCards.findIndex(c => c.id === card.id);
                const wrap = document.createElement('div');
                wrap.className = 'card-wrap';
                wrap.onclick = () => openDetail(gIdx);
                
                // 이미지가 null일 경우 대안 주소 처리
                const cardImg = card.image_small || card.image_large || 'https://via.placeholder.com/250x350?text=No+Image';
                wrap.innerHTML = `<img src="${cardImg}" loading="lazy" alt="${card.name || 'Pokemon Card'}">`;
                grid.appendChild(wrap);
            });
            
            sec.appendChild(grid);
            area.appendChild(sec);
        });

        // 스크롤 시 상단 슬라이더 아이콘 상태 업데이트해주는 인터섹션 감지 추가 (선택 사항 - UI 최적화)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    const setId = entry.target.id.replace('sec-', '');
                    document.querySelectorAll('.set-icon-card').forEach(c => c.classList.remove('active'));
                    document.getElementById('thumb-' + setId)?.classList.add('active');
                }
            });
        }, { threshold: 0.2 });

        sets.forEach(set => {
            const el = document.getElementById('sec-' + set.id);
            if(el) observer.observe(el);
        });
    }

    // 5. 모달 상세 보기 로직 보정 (레듈레이션 마크 및 부가정보 바인딩)
    function openDetail(idx) {
        currentIdx = idx;
        const card = masterCards[idx];
        
        const imgEl = document.getElementById('detail-img');
        imgEl.src = card.image_large || card.image_small || 'https://via.placeholder.com/350x490?text=No+Image';
        
        document.getElementById('detail-name').innerText = card.name || '이름 없음';
        document.getElementById('detail-count').innerText = `${idx + 1} / ${masterCards.length}`;
        
        // 상세 데이터 정보 텍스트 구성
        let infoHtml = `
            <div><strong>ID:</strong> ${card.id} | <strong>No.</strong> ${card.number || 'N/A'}</div>
            <div><strong>Rarity:</strong> ${card.rarity || 'N/A'} | <strong>HP:</strong> ${card.hp || 'N/A'}</div>
            ${card.regulationMark ? `<div><strong>Regulation:</strong> ${card.regulationMark}</div>` : ''}
            ${card.artist ? `<div style="margin-top:5px;"><small>Artist: ${card.artist}</small></div>` : ''}
        `;
        document.getElementById('detail-info').innerHTML = infoHtml;
        
        document.getElementById('detail-view').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() { 
        document.getElementById('detail-view').classList.remove('open'); 
        document.body.style.overflow = ''; 
    }
    
    function nextCard() { if(currentIdx < masterCards.length - 1) openDetail(currentIdx + 1); }
    function prevCard() { if(currentIdx > 0) openDetail(currentIdx - 1); }

    // 시작 부팅
    init();
</script>
</body>
</html>
