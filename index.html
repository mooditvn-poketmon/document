<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-silver: #bdc3c7;
            --dark-bg: #0f1215;
            --card-bg: #1a1d21;
            --accent-glow: rgba(192, 192, 192, 0.2);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--dark-bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
        }

        /* 상단 가로 스크롤 메뉴 */
        nav {
            background: rgba(20, 24, 28, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
            backdrop-filter: blur(10px);
            padding: 10px 0;
        }

        .series-scroll-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 15px;
            gap: 10px;
            -webkit-overflow-scrolling: touch; /* 모바일 부드러운 스크롤 */
        }

        /* 스크롤바 숨기기 */
        .series-scroll-container::-webkit-scrollbar { display: none; }

        .series-tab {
            display: inline-block;
            padding: 8px 18px;
            background: #222;
            border: 1px solid #444;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .series-tab.active {
            background: var(--primary-silver);
            color: #000;
            font-weight: bold;
            border-color: #fff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        header { padding: 20px 15px 5px; text-align: center; }
        h1 { font-size: 1.3rem; color: #fff; margin: 0; letter-spacing: -0.5px; }

        .dex-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 15px;
        }

        .card-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .card-item img {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 8px;
            background: #000;
            aspect-ratio: 250/350;
            object-fit: contain;
        }

        .card-name { font-size: 0.8rem; font-weight: 500; color: #fff; height: 2.4em; overflow: hidden; margin-bottom: 4px; }
        .card-set-badge { font-size: 0.65rem; color: #666; }

        #status-msg { text-align: center; padding: 50px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="series-scroll-container" id="series-menu">
            <div class="series-tab active" onclick="loadCardsBySeries('ALL', this)">ALL</div>
        </div>
    </nav>

    <header>
        <h1 id="view-title">POKÉMON DATABASE</h1>
    </header>

    <div id="status-msg">데이터를 불러오는 중...</div>
    <div class="dex-container" id="dex-container"></div>

    <script>
        const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            // 1. 전체 시리즈 목록만 Distinct하게 가져오기
            // 데이터가 많으므로 시리즈 필드만 뽑아서 중복 제거
            const { data, error } = await client
                .from('master_cards')
                .select('series')
                .not('series', 'is', null);

            if (error) {
                document.getElementById('status-msg').innerText = "메뉴 로드 실패";
                return;
            }

            const seriesList = [...new Set(data.map(item => item.series))].sort();
            const menu = document.getElementById('series-menu');

            seriesList.forEach(series => {
                const tab = document.createElement('div');
                tab.className = 'series-tab';
                tab.innerText = series;
                tab.onclick = (e) => loadCardsBySeries(series, e.target);
                menu.appendChild(tab);
            });

            // 초기 화면: ALL 데이터 로드
            loadCardsBySeries('ALL', document.querySelector('.series-tab'));
        }

        async function loadCardsBySeries(series, element) {
            // UI 업데이트
            document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('view-title').innerText = series === 'ALL' ? 'POKÉMON DATABASE' : series;
            document.getElementById('status-msg').style.display = 'block';
            document.getElementById('status-msg').innerText = `${series} 카드를 불러오는 중...`;
            document.getElementById('dex-container').innerHTML = '';

            // API 호출 (시리즈별 필터링)
            let query = client.from('master_cards').select('name, set_name, image_url_small');
            
            if (series !== 'ALL') {
                query = query.eq('series', series);
            } else {
                query = query.limit(500); // 전체보기는 너무 많으니 500장만 샘플링
            }

            const { data, error } = await query.order('name', { ascending: true });

            if (error) {
                document.getElementById('status-msg').innerText = "데이터 로드 실패";
                return;
            }

            renderCards(data);
            document.getElementById('status-msg').style.display = 'none';
            // 탭 클릭 시 자동으로 해당 탭이 중앙 근처로 오게 스크롤
            element.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function renderCards(cards) {
            const container = document.getElementById('dex-container');
            const fragment = document.createDocumentFragment();

            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item';
                const imgSrc = card.image_url_small || 'https://via.placeholder.com/150x210/1a1d21/666666?text=No+Image';
                
                cardDiv.innerHTML = `
                    <img src="${imgSrc}" loading="lazy">
                    <div class="card-name">${card.name}</div>
                    <div class="card-set-badge">${card.set_name}</div>
                `;
                fragment.appendChild(cardDiv);
            });
            container.appendChild(fragment);
        }

        init();
    </script>
</body>
</html>
