<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-silver: #bdc3c7;
            --dark-bg: #0f1215;
            --card-bg: #1a1d21;
            --accent-glow: rgba(192, 192, 192, 0.2);
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--dark-bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* 네비게이션: 모바일 최적화 고정 메뉴 */
        nav {
            background: rgba(20, 24, 28, 0.98);
            padding: 12px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
            backdrop-filter: blur(15px);
        }

        .menu-wrapper {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        /* 현재 선택된 시리즈를 보여주는 토글 버튼 */
        .menu-toggle-btn {
            width: 100%;
            padding: 12px 20px;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            color: var(--primary-silver);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        /* 드롭다운 리스트 상자 */
        .category-menu {
            display: none; 
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            max-height: 350px; 
            overflow-y: auto; 
            background: #1a1d21;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 8px;
            z-index: 1001;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .category-menu.active {
            display: block;
        }

        .menu-item {
            padding: 14px 15px;
            border-radius: 8px;
            transition: all 0.2s;
            text-align: left;
            color: #bbb;
            font-size: 0.9rem;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
        }

        .menu-item:last-child { border-bottom: none; }

        .menu-item:hover, .menu-item.active {
            background: var(--primary-silver);
            color: #000;
            font-weight: bold;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        h1 { 
            font-size: 1.6rem; 
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -1px;
        }

        /* 카드 그리드 레이아웃 */
        .dex-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 카드 개별 아이템 스타일 */
        .card-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-align: center;
        }

        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-silver);
        }

        .card-item img {
            width: 100%;
            aspect-ratio: 250/350;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #000;
        }

        .card-name { 
            font-weight: 500; 
            color: #fff; 
            margin-bottom: 5px; 
            font-size: 0.85rem; 
            height: 2.4em; 
            line-height: 1.2;
            overflow: hidden; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-set-badge {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.07);
            padding: 2px 6px;
            border-radius: 4px;
            color: #888;
            display: inline-block;
        }

        #loading { 
            text-align: center; 
            padding: 100px 20px; 
            color: #888; 
            font-size: 1rem; 
        }

        /* 스크롤바 디자인 */
        .category-menu::-webkit-scrollbar { width: 6px; }
        .category-menu::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="menu-wrapper">
            <div class="menu-toggle-btn" onclick="toggleMenu(event)">
                <span id="current-series">모든 시리즈 (ALL)</span>
                <span id="arrow">▼</span>
            </div>
            <div class="category-menu" id="category-menu">
                <div class="menu-item active" onclick="filterData('ALL', this)">ALL SERIES</div>
            </div>
        </div>
    </nav>

    <header>
        <h1 id="view-title">POKÉMON DATABASE</h1>
    </header>

    <div id="loading">20,000+ 데이터를 정밀 동기화 중입니다...</div>
    <div class="dex-container" id="dex-container"></div>

    <script>
        const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let allCards = [];

        async function init() {
            // [중요] .limit(25000)을 추가하여 전체 데이터를 가져오도록 수정
            const { data, error } = await client
                .from('master_cards')
                .select('name, series, set_name, image_url_small')
                .order('series', { ascending: true })
                .order('name', { ascending: true })
                .limit(25000); 

            if (error) {
                document.getElementById('loading').innerText = "데이터 로드 중 오류가 발생했습니다.";
                console.error(error);
                return;
            }

            allCards = data;
            
            // 시리즈 목록을 먼저 만들고 렌더링
            createMenu();
            renderCards(allCards);
            
            document.getElementById('loading').style.display = 'none';
        }

        // 메뉴 열고 닫기
        function toggleMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('category-menu');
            const arrow = document.getElementById('arrow');
            const isActive = menu.classList.toggle('active');
            arrow.innerText = isActive ? '▲' : '▼';
        }

        // 중복 제거된 시리즈 목록으로 메뉴 생성
        function createMenu() {
            const menu = document.getElementById('category-menu');
            // 2만 장의 카드에서 고유한 시리즈명만 추출하여 정렬
            const seriesList = [...new Set(allCards.map(c => c.series))].filter(s => s).sort();
            
            seriesList.forEach(series => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerText = series;
                item.onclick = (e) => {
                    e.stopPropagation();
                    filterData(series, item);
                };
                menu.appendChild(item);
            });
        }

        // 특정 시리즈 필터링
        function filterData(series, element) {
            // 메뉴 UI 업데이트
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            element.classList.add('active');

            // 상단 텍스트 변경
            document.getElementById('current-series').innerText = series === 'ALL' ? '모든 시리즈 (ALL)' : series;
            document.getElementById('view-title').innerText = series === 'ALL' ? 'POKÉMON DATABASE' : series;
            
            // 메뉴 닫기
            document.getElementById('category-menu').classList.remove('active');
            document.getElementById('arrow').innerText = '▼';

            // 데이터 필터링 후 다시 그리기
            const filtered = series === 'ALL' ? allCards : allCards.filter(c => c.series === series);
            renderCards(filtered);
            
            // 상단으로 부드럽게 이동
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 카드 렌더링 최적화
        function renderCards(cards) {
            const container = document.getElementById('dex-container');
            container.innerHTML = '';

            // 성능을 위해 DocumentFragment 사용
            const fragment = document.createDocumentFragment();
            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item';
                
                // 이미지 없을 경우 대비
                const imgSrc = card.image_url_small || 'https://via.placeholder.com/250x350/1a1d21/ffffff?text=No+Image';
                
                cardDiv.innerHTML = `
                    <img src="${imgSrc}" loading="lazy" alt="${card.name}">
                    <div class="card-name">${card.name}</div>
                    <div class="card-set-badge">${card.set_name}</div>
                `;
                fragment.appendChild(cardDiv);
            });
            container.appendChild(fragment);
        }

        // 메뉴 바깥쪽 클릭 시 자동 닫기
        window.onclick = function(event) {
            const menu = document.getElementById('category-menu');
            if (menu.classList.contains('active')) {
                menu.classList.remove('active');
                document.getElementById('arrow').innerText = '▼';
            }
        }

        init();
    </script>
</body>
</html>
