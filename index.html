<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0d0f; --panel: #16181c; --accent: #f1c40f;
            --text: #ffffff; --dim: #8e8e93; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; }

        /* 헤더 섹션 */
        .header-fixed { position: sticky; top: 0; z-index: 1000; background: rgba(11, 13, 15, 0.98); border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
        .series-bar { display: flex; overflow-x: auto; padding: 15px 15px 5px; gap: 10px; scrollbar-width: none; }
        .series-bar::-webkit-scrollbar { display: none; }
        .series-tab { padding: 8px 18px; background: #222; border-radius: 40px; font-size: 0.9rem; white-space: nowrap; color: var(--dim); cursor: pointer; transition: 0.2s; }
        .series-tab.active { background: #fff; color: #000; font-weight: 800; }

        /* 세트 슬라이더 (2행) */
        .set-slider { display: flex; overflow-x: auto; padding: 10px 15px 20px; gap: 15px; scrollbar-width: none; min-height: 110px; }
        .set-slider::-webkit-scrollbar { display: none; }
        .set-icon-card { flex-shrink: 0; width: 85px; text-align: center; cursor: pointer; }
        .set-icon-card img { width: 65px; height: 65px; object-fit: contain; background: #000; border-radius: 15px; padding: 8px; border: 1px solid var(--border); }
        .set-icon-card span { display: block; font-size: 0.65rem; color: #fff; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 메인 뷰 */
        .main-view { padding: 15px; min-height: 100vh; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 30px 0 15px; padding-left: 10px; border-left: 4px solid var(--accent); display: flex; align-items: center; gap: 10px; }
        .section-title img { height: 22px; object-fit: contain; }
        
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 40px; }
        .card-wrap { position: relative; border-radius: 10px; overflow: hidden; background: #111; aspect-ratio: 250/350; }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-badge { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: #fff; font-size: 8px; padding: 2px 5px; border-radius: 4px; z-index: 10; }

        /* 상세 페이지 */
        #detail-view { display: none; position: fixed; inset: 0; z-index: 2000; background: var(--bg); flex-direction: column; overflow-y: auto; }
        #detail-view.open { display: flex; }
        .detail-header { display: flex; justify-content: space-between; padding: 20px; align-items: center; border-bottom: 1px solid var(--border); }
        .detail-body { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .big-card-img { width: 100%; max-width: 350px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 30px; }
        
        .footer-nav { position: sticky; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); display: flex; justify-content: center; gap: 30px; }
        .nav-btn { background: #fff; color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="series-bar" id="series-bar"></div>
    <div class="set-slider" id="set-slider"></div>
</div>

<div class="main-view" id="content-area"></div>

<div id="detail-view">
    <div class="detail-header">
        <span id="detail-count" style="font-weight: 800; color: var(--accent);"></span>
        <span onclick="closeDetail()" style="font-size: 35px; cursor: pointer;">&times;</span>
    </div>
    <div class="detail-body">
        <img id="detail-img" class="big-card-img" src="">
        <div style="width:100%; max-width:450px;">
            <h2 id="detail-name" style="font-size: 1.8rem; margin-bottom: 20px;"></h2>
            <div id="detail-info" style="background:#1a1d21; border-radius:12px; padding:20px; border:1px solid var(--border);"></div>
        </div>
    </div>
    <div class="footer-nav">
        <div class="nav-btn" onclick="prevCard()">◀</div>
        <div class="nav-btn" onclick="nextCard()">▶</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let masterCards = [];
    let currentIdx = 0;

    async function init() {
        const { data: series } = await client.from('series').select('*').order('series');
        const bar = document.getElementById('series-bar');
        
        const allTab = document.createElement('div');
        allTab.className = 'series-tab active';
        allTab.innerText = 'ALL';
        allTab.onclick = () => { updateTab(allTab); loadContent(null); };
        bar.appendChild(allTab);

        series.forEach(s => {
            const div = document.createElement('div');
            div.className = 'series-tab';
            div.innerText = s.series;
            div.onclick = () => { updateTab(div); loadContent(s.series); };
            bar.appendChild(div);
        });
        loadContent(null);
    }

    function updateTab(target) {
        document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
        target.classList.add('active');
    }

    async function loadContent(seriesName) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div style="text-align:center; padding-top:100px; color:var(--dim);">데이터 매칭 중...</div>';
        
        let sQ = client.from('sets').select('*').order('releaseDate', {ascending: false});
        if(seriesName) sQ = sQ.eq('series', seriesName);
        const { data: sets } = await sQ;

        // 세트 슬라이더
        const slider = document.getElementById('set-slider');
        slider.innerHTML = '';
        sets.forEach(s => {
            const div = document.createElement('div');
            div.className = 'set-icon-card';
            div.innerHTML = `<img src="${s.image_logo || s.image_symbol}"><span>${s.name}</span>`;
            div.onclick = () => document.getElementById('sec-' + s.name.replace(/\s+/g, ''))?.scrollIntoView({behavior:'smooth'});
            slider.appendChild(div);
        });

        // 카드 로드: set_id가 비어있으니 set_name 또는 set 컬럼으로 매칭
        const setNames = sets.map(s => s.name);
        const { data: cards } = await client.from('cards').select('*').in('set_name', setNames);
        
        // 만약 set_name 컬럼이 아니라 'set' 컬럼일 경우를 대비한 fallback
        if(!cards || cards.length === 0) {
            const { data: fallbackCards } = await client.from('cards').select('*').in('set', setNames);
            masterCards = (fallbackCards || []).sort((a,b) => a.number - b.number);
        } else {
            masterCards = cards.sort((a,b) => a.number - b.number);
        }

        area.innerHTML = '';
        sets.forEach(set => {
            const sCards = masterCards.filter(c => (c.set_name === set.name || c.set === set.name));
            if(sCards.length === 0) return;

            const sec = document.createElement('div');
            sec.id = 'sec-' + set.name.replace(/\s+/g, '');
            sec.innerHTML = `<div class="section-title"><img src="${set.image_symbol || ''}">${set.name}</div>`;
            const grid = document.createElement('div');
            grid.className = 'card-grid';
            
            sCards.forEach(card => {
                const gIdx = masterCards.findIndex(c => c.id === card.id);
                const wrap = document.createElement('div');
                wrap.className = 'card-wrap';
                wrap.onclick = () => openDetail(gIdx);
                wrap.innerHTML = `<div class="card-badge">#${card.number}</div><img src="${card.image_small}" loading="lazy">`;
                grid.appendChild(wrap);
            });
            sec.appendChild(grid);
            area.appendChild(sec);
        });
    }

    function openDetail(idx) {
        currentIdx = idx;
        const card = masterCards[idx];
        document.getElementById('detail-img').src = card.image_large;
        document.getElementById('detail-name').innerText = card.name;
        document.getElementById('detail-count').innerText = `CARD ${idx + 1} / ${masterCards.length}`;
        document.getElementById('detail-info').innerHTML = `
            <p><b>Supertype:</b> ${card.supertype}</p>
            <p><b>HP:</b> ${card.hp || 'N/A'}</p>
            <p><b>Rarity:</b> ${card.rarity || 'N/A'}</p>
        `;
        document.getElementById('detail-view').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() { document.getElementById('detail-view').classList.remove('open'); document.body.style.overflow = ''; }
    function nextCard() { if(currentIdx < masterCards.length - 1) openDetail(currentIdx + 1); }
    function prevCard() { if(currentIdx > 0) openDetail(currentIdx - 1); }

    init();
</script>
</body>
</html>
