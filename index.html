<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODIT Pokemon TCG Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-silver: #bdc3c7;
            --dark-bg: #0f1215;
            --card-bg: #1a1d21;
            --accent-glow: rgba(192, 192, 192, 0.2);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--dark-bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
        }

        /* 상단 네비게이션 메뉴 */
        nav {
            background: rgba(20, 24, 28, 0.95);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .category-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-item {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 30px;
            background: #222;
            border: 1px solid #444;
            transition: all 0.3s;
            font-size: 0.9rem;
            color: #bbb;
        }

        .menu-item:hover, .menu-item.active {
            background: var(--primary-silver);
            color: #000;
            border-color: #fff;
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        header { padding: 40px 20px; text-align: center; }
        h1 { 
            font-size: 2.2rem; 
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* 카드 그리드 */
        .dex-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 50px;
        }

        /* 카드 스타일 */
        .card-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            transition: all 0.4s ease;
            text-align: center;
        }

        .card-item:hover {
            transform: translateY(-8px);
            border-color: var(--primary-silver);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .card-item img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .card-name { font-weight: 600; color: #fff; margin-bottom: 8px; font-size: 1rem; }
        .card-set-badge {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 5px;
            color: #aaa;
        }

        #loading { text-align: center; padding: 100px; color: #666; }
    </style>
</head>
<body>

    <nav>
        <div class="category-menu" id="category-menu">
            <div class="menu-item active" onclick="filterData('ALL', this)">ALL</div>
            </div>
    </nav>

    <header>
        <h1 id="view-title">POKÉMON DATABASE</h1>
    </header>

    <div id="loading">데이터를 동기화 중입니다...</div>
    <div class="dex-container" id="dex-container"></div>

    <script>
        const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let allCards = [];

        async function init() {
            // 1. 전체 데이터 로드 (시리즈 구분을 위해)
            const { data, error } = await client
                .from('master_cards')
                .select('name, series, set_name, image_url_small')
                .order('name', { ascending: true });

            if (error) {
                document.getElementById('loading').innerText = "데이터 로드 실패";
                return;
            }

            allCards = data;
            
            // 2. 시리즈 메뉴 생성
            createMenu();
            // 3. 전체 카드 렌더링
            renderCards(allCards);
            document.getElementById('loading').style.display = 'none';
        }

        function createMenu() {
            const menu = document.getElementById('category-menu');
            // 중복 제거된 시리즈 목록 추출
            const seriesList = [...new Set(allCards.map(c => c.series))].filter(s => s);
            
            seriesList.forEach(series => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerText = series;
                item.onclick = (e) => filterData(series, e.target);
                menu.appendChild(item);
            });
        }

        function filterData(series, element) {
            // 메뉴 활성화 상태 변경
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            element.classList.add('active');

            // 제목 변경
            document.getElementById('view-title').innerText = series === 'ALL' ? 'POKÉMON DATABASE' : series;

            // 데이터 필터링
            const filtered = series === 'ALL' ? allCards : allCards.filter(c => c.series === series);
            renderCards(filtered);
        }

        function renderCards(cards) {
            const container = document.getElementById('dex-container');
            container.innerHTML = ''; // 기존 카드 제거

            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item';
                const imgSrc = card.image_url_small || 'https://via.placeholder.com/250x350/1a1d21/ffffff?text=No+Image';
                
                cardDiv.innerHTML = `
                    <img src="${imgSrc}" loading="lazy">
                    <div class="card-name">${card.name}</div>
                    <div class="card-set-badge">${card.set_name}</div>
                `;
                container.appendChild(cardDiv);
            });
        }

        init();
    </script>
</body>
</html>
