<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT POKEDEX MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0d0f; --panel: #16181c; --accent: #f1c40f;
            --text: #ffffff; --dim: #8e8e93; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; }

        /* 상단 고정 필터 */
        .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(11,13,15,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        
        /* 1단: 시리즈 텍스트 탭 (좌우 스크롤) */
        .scroll-row { display: flex; overflow-x: auto; padding: 12px 15px; gap: 10px; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }
        .tab { padding: 6px 16px; background: #222; border-radius: 20px; font-size: 0.85rem; white-space: nowrap; color: var(--dim); cursor: pointer; }
        .tab.active { background: #fff; color: #000; font-weight: bold; }

        /* 2단: 선택된 시리즈의 세트 이미지 (좌우 스크롤) */
        .image-scroll-row { display: flex; overflow-x: auto; padding: 10px 15px 20px; gap: 15px; scrollbar-width: none; }
        .image-scroll-row::-webkit-scrollbar { display: none; }
        .set-card { flex-shrink: 0; width: 100px; text-align: center; cursor: pointer; transition: 0.2s; }
        .set-card img { width: 70px; height: 70px; object-fit: contain; background: #000; border-radius: 12px; padding: 5px; border: 2px solid transparent; }
        .set-card.active img { border-color: var(--accent); transform: scale(1.1); }
        .set-card span { display: block; font-size: 0.7rem; color: var(--dim); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 메인: 카드 그리드 */
        .main-content { padding: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card-item { position: relative; border-radius: 8px; overflow: hidden; background: #111; }
        .card-item img { width: 100%; aspect-ratio: 250/350; object-fit: cover; display: block; }

        /* 상세 페이지 (모달 형식) */
        .detail-page { display: none; position: fixed; inset: 0; z-index: 1000; background: var(--bg); flex-direction: column; }
        .detail-page.open { display: flex; }
        .detail-nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .close-x { font-size: 30px; cursor: pointer; }
        
        .detail-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .detail-main-img { width: 85%; max-width: 350px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px; }
        
        /* 하단 슬라이드 버튼 */
        .slide-ctrl { display: flex; gap: 40px; padding-bottom: 50px; }
        .ctrl-btn { background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 15px 30px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="scroll-row" id="series-row"></div>
    <div class="image-scroll-row" id="set-row"></div>
</div>

<div class="main-content">
    <div class="card-grid" id="card-grid"></div>
</div>

<div id="detail-page" class="detail-page">
    <div class="detail-nav">
        <div id="detail-set-info" style="color:var(--dim); font-size:0.8rem;"></div>
        <div class="close-x" onclick="closeDetail()">&times;</div>
    </div>
    <div class="detail-body">
        <img id="detail-img" class="detail-main-img" src="">
        <h2 id="detail-name" style="margin:10px 0 5px;"></h2>
        <p id="detail-meta" style="color:var(--accent); font-weight:bold;"></p>
        
        <div class="slide-ctrl">
            <button class="ctrl-btn" onclick="prevCard()">◀</button>
            <button class="ctrl-btn" onclick="nextCard()">▶</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentCards = [];
    let currentIndex = 0;

    async function init() {
        const { data: series } = await client.from('series').select('*').order('series');
        const row = document.getElementById('series-row');
        series.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = `tab ${idx === 0 ? 'active' : ''}`;
            div.innerText = s.series;
            div.onclick = (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
                loadSets(s.series);
            };
            row.appendChild(div);
            if(idx === 0) loadSets(s.series);
        });
    }

    async function loadSets(seriesName) {
        const { data: sets } = await client.from('sets').select('*').eq('series', seriesName).order('releaseDate', {ascending: false});
        const row = document.getElementById('set-row');
        row.innerHTML = '';
        sets.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = `set-card ${idx === 0 ? 'active' : ''}`;
            div.innerHTML = `
                <img src="${s.image_logo || s.image_symbol}">
                <span>${s.name}</span>
            `;
            div.onclick = () => {
                document.querySelectorAll('.set-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                loadCards(s.id);
            };
            row.appendChild(div);
            if(idx === 0) loadCards(s.id);
        });
    }

    async function loadCards(setId) {
        const { data: cards } = await client.from('cards').select('*').eq('set_id', setId).order('number', {ascending: true});
        currentCards = cards;
        const grid = document.getElementById('card-grid');
        grid.innerHTML = '';
        cards.forEach((c, idx) => {
            const item = document.createElement('div');
            item.className = 'card-item';
            item.onclick = () => openDetail(idx);
            item.innerHTML = `<img src="${c.image_small}" loading="lazy">`;
            grid.appendChild(item);
        });
    }

    function openDetail(idx) {
        currentIndex = idx;
        const card = currentCards[currentIndex];
        document.getElementById('detail-img').src = card.image_large;
        document.getElementById('detail-name').innerText = card.name;
        document.getElementById('detail-meta').innerText = `${card.hp ? card.hp + ' HP' : ''} / ${card.rarity || ''}`;
        document.getElementById('detail-set-info').innerText = `${currentIndex + 1} / ${currentCards.length}`;
        document.getElementById('detail-page').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
        document.getElementById('detail-page').classList.remove('open');
        document.body.style.overflow = '';
    }

    function nextCard() { if(currentIndex < currentCards.length - 1) openDetail(currentIndex + 1); }
    function prevCard() { if(currentIndex > 0) openDetail(currentIndex - 1); }

    init();
</script>
</body>
</html>
