<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DB 연결 최종 확인</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>📡 DB 실시간 연결 확인</h1>
    <div id="status">연결 시도 중...</div>
    <ul id="test-list" style="font-size: 1.1rem; line-height: 1.8; color: #333;"></ul>

    <script>
        // 변수명 충돌 방지를 위해 mySupabaseUrl, mySupabaseKey 등으로 명명합니다.
        const mySupabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
        const mySupabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
        
        // 라이브러리 객체와 변수명이 겹치지 않게 myClient로 생성합니다.
        const myClient = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        async function fetchTestData() {
            const statusBox = document.getElementById('status');
            const list = document.getElementById('test-list');

            try {
                // master_cards 테이블에서 상위 10개 레코드의 ID, 이름, 세트이름 가져오기
                const { data, error } = await myClient
                    .from('master_cards')
                    .select('id, name, set_name')
                    .limit(10);

                if (error) {
                    console.error("연결 에러 세부사항:", error);
                    statusBox.innerHTML = `<b style="color:red;">❌ 연결 실패: ${error.message}</b>`;
                    return;
                }

                if (data && data.length > 0) {
                    statusBox.innerHTML = `<b style="color:green;">✅ 연결 성공! DB에 총 ${data.length}개의 데이터가 노출됩니다.</b>`;
                    data.forEach(item => {
                        const li = document.createElement('li');
                        // set_name이 비어있을 경우를 대비해 '이름 없음' 처리
                        const setName = item.set_name || "세트 정보 없음";
                        li.innerText = `🃏 카드명: ${item.name} | 📦 세트: ${setName} (ID: ${item.id})`;
                        list.appendChild(li);
                    });
                } else {
                    statusBox.innerHTML = `<b>⚠️ 연결은 성공했으나, 테이블('master_cards')에 데이터가 한 건도 없습니다.</b>`;
                }
            } catch (err) {
                statusBox.innerHTML = `<b style="color:red;">❌ 실행 오류: ${err.message}</b>`;
            }
        }

        fetchTestData();
    </script>
</body>
</html>
