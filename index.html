<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0d0f; --panel: #16181c; --accent: #f1c40f;
            --text: #ffffff; --dim: #8e8e93; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; }

        .header-fixed { position: sticky; top: 0; z-index: 1000; background: rgba(11, 13, 15, 0.98); border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
        
        /* 1단 시리즈 바 */
        .series-bar { display: flex; overflow-x: auto; padding: 15px 15px 5px; gap: 10px; scrollbar-width: none; }
        .series-bar::-webkit-scrollbar { display: none; }
        .series-tab { padding: 8px 18px; background: #222; border-radius: 40px; font-size: 0.9rem; white-space: nowrap; color: var(--dim); cursor: pointer; }
        .series-tab.active { background: #fff; color: #000; font-weight: 800; }

        /* 2단 세트 슬라이더 */
        .set-slider { display: flex; overflow-x: auto; padding: 10px 15px 20px; gap: 15px; scrollbar-width: none; min-height: 100px; }
        .set-slider::-webkit-scrollbar { display: none; }
        .set-icon-card { flex-shrink: 0; width: 85px; text-align: center; cursor: pointer; }
        .set-icon-card img { width: 65px; height: 65px; object-fit: contain; background: #000; border-radius: 15px; padding: 8px; border: 1px solid var(--border); }
        .set-icon-card.all-icon img { background: var(--accent); display: flex; align-items: center; justify-content: center; }
        .set-icon-card span { display: block; font-size: 0.65rem; color: #fff; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .main-view { padding: 15px; min-height: 80vh; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 30px 0 15px; padding-left: 10px; border-left: 4px solid var(--accent); display: flex; align-items: center; gap: 10px; }
        .section-title img { height: 22px; object-fit: contain; }
        
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 40px; }
        .card-wrap { position: relative; border-radius: 10px; overflow: hidden; background: #111; aspect-ratio: 250/350; }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-badge { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: #fff; font-size: 8px; padding: 2px 5px; border-radius: 4px; z-index: 10; }

        /* 상세 페이지 */
        #detail-view { display: none; position: fixed; inset: 0; z-index: 2000; background: var(--bg); flex-direction: column; overflow-y: auto; }
        #detail-view.open { display: flex; }
        .detail-header { display: flex; justify-content: space-between; padding: 20px; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
        .detail-body { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .big-card-img { width: 100%; max-width: 350px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 30px; }
        .info-panel { width: 100%; max-width: 450px; }
        .attack-box { background: #1a1d21; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .atk-header { display: flex; justify-content: space-between; font-weight: 800; color: #fff; }
        .atk-desc { font-size: 0.85rem; color: var(--dim); margin-top: 5px; line-height: 1.4; }

        .footer-nav { position: sticky; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); display: flex; justify-content: center; gap: 30px; z-index: 10; }
        .nav-btn { background: #fff; color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="series-bar" id="series-bar"></div>
    <div class="set-slider" id="set-slider"></div>
</div>

<div class="main-view" id="content-area"></div>

<div id="detail-view">
    <div class="detail-header">
        <span id="detail-count" style="font-size: 0.9rem; font-weight: 800;"></span>
        <span onclick="closeDetail()" style="font-size: 35px; cursor: pointer;">&times;</span>
    </div>
    <div class="detail-body">
        <img id="detail-img" class="big-card-img" src="">
        <div class="info-panel">
            <h2 id="detail-name" style="font-size: 1.8rem; margin: 0 0 10px; font-weight: 900;"></h2>
            <div id="detail-tags" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 25px;"></div>
            <div id="detail-attacks"></div>
        </div>
    </div>
    <div class="footer-nav">
        <div class="nav-btn" onclick="prevCard()">◀</div>
        <div class="nav-btn" onclick="nextCard()">▶</div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let masterCards = [];
    let currentIdx = 0;

    async function init() {
        const { data: series } = await client.from('series').select('*').order('series');
        const bar = document.getElementById('series-bar');
        
        // Series [ALL]
        const allTab = document.createElement('div');
        allTab.className = 'series-tab active';
        allTab.innerText = 'ALL';
        allTab.onclick = () => {
            document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
            allTab.classList.add('active');
            loadContent(null);
        };
        bar.appendChild(allTab);

        series.forEach(s => {
            const div = document.createElement('div');
            div.className = 'series-tab';
            div.innerText = s.series;
            div.onclick = () => {
                document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
                loadContent(s.series);
            };
            bar.appendChild(div);
        });

        loadContent(null);
    }

    async function loadContent(seriesName) {
        // 1. Sets 가져오기
        let setsQuery = client.from('sets').select('*').order('releaseDate', {ascending: false});
        if(seriesName) setsQuery = setsQuery.eq('series', seriesName);
        const { data: sets } = await setsQuery;

        const slider = document.getElementById('set-slider');
        slider.innerHTML = '';
        
        // Sets [ALL]
        const allSetIcon = document.createElement('div');
        allSetIcon.className = 'set-icon-card all-icon';
        allSetIcon.innerHTML = `<img src="https://img.icons8.com/ios-filled/50/000000/grid.png"><span>ALL</span>`;
        allSetIcon.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        slider.appendChild(allSetIcon);

        sets.forEach(s => {
            const div = document.createElement('div');
            div.className = 'set-icon-card';
            div.innerHTML = `<img src="${s.image_logo || s.image_symbol}"><span>${s.name}</span>`;
            div.onclick = () => {
                const target = document.getElementById('sec-' + s.id);
                if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            slider.appendChild(div);
        });

        // 2. Cards 가져오기
        const setIds = sets.map(s => s.id);
        const { data: cards } = await client.from('cards').select('*').in('set_id', setIds).order('set_id').order('number', {ascending: true});
        masterCards = cards;
        
        const area = document.getElementById('content-area');
        area.innerHTML = '';

        sets.forEach(set => {
            const setCards = cards.filter(c => c.set_id === set.id);
            if(setCards.length === 0) return;

            const section = document.createElement('div');
            section.id = 'sec-' + set.id; // ID 겹침 방지
            section.innerHTML = `<div class="section-title"><img src="${set.image_symbol || ''}">${set.name}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'card-grid';
            setCards.forEach(card => {
                const gIdx = cards.findIndex(c => c.id === card.id);
                const wrap = document.createElement('div');
                wrap.className = 'card-wrap';
                wrap.onclick = () => openDetail(gIdx);
                wrap.innerHTML = `<div class="card-badge">#${card.number}</div><img src="${card.image_small}" loading="lazy">`;
                grid.appendChild(wrap);
            });
            section.appendChild(grid);
            area.appendChild(section);
        });
    }

    function openDetail(idx) {
        currentIdx = idx;
        const card = masterCards[currentIdx];
        if(!card) return;

        document.getElementById('detail-img').src = card.image_large;
        document.getElementById('detail-name').innerText = card.name;
        document.getElementById('detail-count').innerText = `CARD ${currentIdx + 1} / ${masterCards.length}`;
        
        document.getElementById('detail-tags').innerHTML = `
            <div style="padding: 5px 12px; background: #222; border-radius: 6px; font-size: 0.8rem; color: var(--accent); border: 1px solid var(--border);">${card.supertype}</div>
            <div style="padding: 5px 12px; background: #222; border-radius: 6px; font-size: 0.8rem; color: var(--accent); border: 1px solid var(--border);">${card.hp || 'N/A'} HP</div>
        `;

        let atkHtml = '';
        if(card.attacks) {
            card.attacks.forEach(a => {
                atkHtml += `<div class="attack-box"><div class="atk-header"><span>${a.name}</span><span>${a.damage || ''}</span></div><div class="atk-desc">${a.text || ''}</div></div>`;
            });
        }
        document.getElementById('detail-attacks').innerHTML = atkHtml;
        document.getElementById('detail-view').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() { document.getElementById('detail-view').classList.remove('open'); document.body.style.overflow = ''; }
    function nextCard() { if(currentIdx < masterCards.length - 1) openDetail(currentIdx + 1); }
    function prevCard() { if(currentIdx > 0) openDetail(currentIdx - 1); }

    init();
</script>
</body>
</html>
