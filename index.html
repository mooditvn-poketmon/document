<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIT TCG MASTER (LAZY LOAD)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0d0f; --accent: #f1c40f; --text: #ffffff; --dim: #8e8e93; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header-fixed { position: sticky; top: 0; z-index: 1000; background: rgba(11,13,15,0.98); border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); }
        .series-bar, .set-slider { display: flex; overflow-x: auto; padding: 12px; gap: 10px; scrollbar-width: none; }
        .series-bar::-webkit-scrollbar, .set-slider::-webkit-scrollbar { display: none; }
        
        .series-tab { padding: 6px 16px; background: #222; border-radius: 40px; font-size: 0.85rem; white-space: nowrap; cursor: pointer; color: var(--dim); }
        .series-tab.active { background: #fff; color: #000; font-weight: bold; }
        
        .set-icon-card { flex-shrink: 0; width: 75px; text-align: center; cursor: pointer; opacity: 0.6; }
        .set-icon-card.active { opacity: 1; font-weight: bold; }
        .set-icon-card img { width: 50px; height: 50px; object-fit: contain; background: #000; border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
        .set-icon-card.active img { border-color: var(--accent); }
        .set-icon-card span { display: block; font-size: 0.6rem; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .main-view { padding: 15px; padding-bottom: 40px; }
        .section-title { font-size: 1rem; font-weight: 800; margin: 25px 0 12px; border-left: 4px solid var(--accent); padding-left: 10px; color: #fff; }
        
        .card-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 10px; align-items: center; }
        .card-wrap { width: 100%; max-width: 320px; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 245/342; position: relative; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* 로딩 가이드 UI */
        .loading-trigger { text-align: center; padding: 20px; color: var(--dim); font-size: 0.85rem; display: none; }

        #detail-view { display: none; position: fixed; inset: 0; z-index: 2000; background: #050708; flex-direction: column; overflow: hidden; }
        #detail-view.open { display: flex; }
        
        .detail-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: linear-gradient(#050708, transparent); z-index: 10; }
        
        .detail-swiper-container { width: 100%; height: 42vh; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; align-items: center; }
        .detail-swiper-container::-webkit-scrollbar { display: none; }
        .detail-slide { flex-shrink: 0; width: 100%; display: flex; justify-content: center; align-items: center; scroll-snap-align: start; }
        .detail-slide img { height: 38vh; max-height: 350px; aspect-ratio: 245/342; object-fit: contain; border-radius: 12px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); }

        .detail-info-sheet { flex: 1; background: #0f1215; border-top-left-radius: 24px; border-top-right-radius: 24px; border-top: 1px solid var(--border); padding: 25px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .detail-info-sheet h2 { margin: 0 0 15px 0; font-size: 1.4rem; font-weight: 800; color: #fff; text-align: left; }
        .info-scroll-body { color: var(--dim); font-size: 0.95rem; line-height: 1.6; padding-bottom: 40px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-row span:first-child { color: var(--dim); font-weight: bold; }
        .info-row span:last-child { color: #fff; }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="series-bar" id="series-bar"></div>
    <div class="set-slider" id="set-slider"></div>
</div>

<div class="main-view">
    <div id="content-area"></div>
    <div id="loading-block" class="loading-trigger">네트워크 연결 중... 20장 추가 로드</div>
</div>

<div id="detail-view">
    <div class="detail-header">
        <span id="detail-count" style="color:var(--accent); font-weight:bold; font-size: 0.95rem;"></span>
        <span onclick="closeDetail()" style="font-size:32px; cursor:pointer; color:#fff; user-select:none;">&times;</span>
    </div>
    
    <div class="detail-swiper-container" id="detail-swiper" onscroll="handleSwiperScroll()"></div>
    
    <div class="detail-info-sheet">
        <h2 id="detail-name"></h2>
        <div class="info-scroll-body" id="detail-info"></div>
    </div>
</div>

<script>
    const supabaseUrl = "https://piiyexmbntafddnlszmm.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXlleG1ibnRhZmRkbmxzem1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg4NjEsImV4cCI6MjA5NDE2NDg2MX0.E_i1IFdGrXGN3_qMGY_7PJ5XZsYt05q7dmTQ42D0mcw";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let masterCards = [];        // 현재 화면에 렌더링되어 매핑된 카드 풀
    let currentIdx = 0;
    
    // 페이징 제어 변수들
    let targetSetIds = [];       // 현재 카테고리(시리즈)에 속한 세트 ID 배열
    let currentSetIndex = 0;     // 처리 중인 세트 번호
    let currentOffset = 0;       // 현재 세트 내에서 스킵한 데이터 양
    const PAGE_SIZE = 20;        // [요청 반영] 1회 로드당 20장 제한
    let hasMoreData = true;      // 더 가져올 데이터가 있는지 판별 플래그
    let isLoading = false;       // 네트워크 중복 호출 방지 락

    async function init() {
        const { data: setsData, error } = await client.from('sets').select('series').order('series');
        if (error) return;

        const uniqueSeries = [...new Set(setsData.map(item => item.series))].filter(Boolean);
        const bar = document.getElementById('series-bar');
        
        const allBtn = document.createElement('div');
        allBtn.className = 'series-tab active';
        allBtn.innerText = 'ALL';
        allBtn.onclick = () => { updateActiveTab(allBtn); startNewCategory(null); };
        bar.appendChild(allBtn);

        uniqueSeries.forEach(seriesName => {
            const t = document.createElement('div');
            t.className = 'series-tab';
            t.innerText = seriesName;
            t.onclick = () => { updateActiveTab(t); startNewCategory(seriesName); };
            bar.appendChild(t);
        });

        startNewCategory(null);
        setupIntersectionObserver(); // 무한 스크롤 트리거 작동 시작
    }

    function updateActiveTab(target) {
        document.querySelectorAll('.series-tab').forEach(t => t.classList.remove('active'));
        target.classList.add('active');
    }

    // 1. 카테고리(시리즈) 변경 시 페이징 상태값 완전 초기화 함수
    async function startNewCategory(seriesName) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div style="text-align:center; padding-top:100px; color:var(--dim); font-size:0.9rem;">초기 동기화 중...</div>';
        
        // 데이터 풀 전면 리셋
        masterCards = [];
        currentSetIndex = 0;
        currentOffset = 0;
        hasMoreData = true;
        isLoading = false;

        let query = client.from('sets').select('*').order('releaseDate', {ascending: false});
        if (seriesName) query = query.eq('series', seriesName);
        
        const { data: sets } = await query;
        if (!sets || sets.length === 0) {
            area.innerHTML = '<div style="text-align:center; padding-top:100px; color:var(--dim);">세트 정보가 없습니다.</div>';
            document.getElementById('loading-block').style.display = 'none';
            return;
        }

        renderSlider(sets);
        
        // 현재 탭에 맞는 글로벌 타겟 세트 구조체 빌드
        targetSetIds = sets;
        area.innerHTML = ''; // 안내문 초기화 후 20장 가져오기 진입
        
        await loadNextBatch20();
    }

    function renderSlider(sets) {
        const slider = document.getElementById('set-slider');
        slider.innerHTML = '';
        sets.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = `set-icon-card ${idx === 0 ? 'active' : ''}`;
            div.id = 'thumb-' + s.id;
            const imgUrl = s.image_logo || s.image_symbol || 'https://via.placeholder.com/50?text=No';
            div.innerHTML = `<img src="${imgUrl}"><span>${s.name}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.set-icon-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                document.getElementById('sec-' + s.id)?.scrollIntoView({behavior:'smooth', block:'center'});
            };
            slider.appendChild(div);
        });
    }

    // 2. [핵심 로직] 정확하게 20장씩만 잘라서 점진적으로 네트워크 호출하는 엔진
    async function loadNextBatch20() {
        if (isLoading || !hasMoreData) return;
        isLoading = true;
        document.getElementById('loading-block').style.display = 'block';

        if (currentSetIndex >= targetSetIds.length) {
            hasMoreData = false;
            document.getElementById('loading-block').style.display = 'none';
            isLoading = false;
            return;
        }

        // 현재 순서의 세트 정보 타겟팅
        let currentSet = targetSetIds[currentSetIndex];

        // Supabase 오프셋 페이징 쿼리 (20장 타겟팅 제한)
        const { data: cards, error } = await client
            .from('cards')
            .select('*')
            .eq('set_id', currentSet.id)
            .order('number', { ascending: true })
            .range(currentOffset, currentOffset + PAGE_SIZE - 1);

        if (error || !cards || cards.length === 0) {
            // 현재 세트에 더이상 카드가 없으면 다음 세트로 이동 후 재귀 호출
            currentSetIndex++;
            currentOffset = 0;
            isLoading = false;
            await loadNextBatch20();
            return;
        }

        // 마스터 데이터 풀에 20장 추가 추가 바인딩
        masterCards = masterCards.concat(cards);
        
        renderCardsToSection(currentSet, cards);

        // 오프셋 증가
        currentOffset += cards.length;

        // 만약 가져온 카드가 요청한 크기(20장)보다 작다면 이 세트는 끝난 것이므로 다음 세트로 포인터 조정
        if (cards.length < PAGE_SIZE) {
            currentSetIndex++;
            currentOffset = 0;
        }

        isLoading = false;
        document.getElementById('loading-block').style.display = 'none';
    }

    // 3. 가져온 20장의 카드 덩어리를 화면에 순차 추가 조립하는 UI 렌더러
    function renderCardsToSection(set, newCards) {
        const area = document.getElementById('content-area');
        
        // 해당 세트의 구역(Section) 돔 엘리먼트가 있는지 검사
        let sec = document.getElementById('sec-' + set.id);
        let grid;

        if (!sec) {
            // 구역이 최초 개설되는 경우에만 헤더 제목 타이틀을 박아줍니다.
            sec = document.createElement('div');
            sec.id = 'sec-' + set.id;
            sec.innerHTML = `<div class="section-title" id="title-text-${set.id}">${set.name}</div>`;
            
            grid = document.createElement('div');
            grid.className = 'card-grid';
            grid.id = 'grid-' + set.id;
            
            sec.appendChild(grid);
            area.appendChild(sec);
        } else {
            grid = document.getElementById('grid-' + set.id);
        }

        // 20장 순회하면서 이미지 주입 (.card-wrap 1열 모바일 전용 아키텍처)
        newCards.forEach(card => {
            const gIdx = masterCards.findIndex(c => c.id === card.id);
            const wrap = document.createElement('div');
            wrap.className = 'card-wrap';
            wrap.onclick = () => openDetail(gIdx);
            
            const cardImg = card.image_small || card.image_large || 'https://via.placeholder.com/250x350?text=No+Image';
            wrap.innerHTML = `<img src="${cardImg}" loading="lazy" alt="Card">`;
            grid.appendChild(wrap);
        });

        // 세트별 상단 썸네일 동기화용 트리거 옵저버 세팅
        setupSetTitleObserver(set.id);
    }

    // 4. 하단 화면 끝에 닿았을 때 자동으로 무한스크롤 이벤트 구동시키는 센서
    function setupIntersectionObserver() {
        const trigger = document.getElementById('loading-block');
        const observer = new IntersectionObserver(async (entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMoreData) {
                await loadNextBatch20();
            }
        }, { rootMargin: '300px' }); // 하단 도달하기 300px 전에 미리 호출하여 끊김 제거
        
        observer.observe(trigger);
    }

    function setupSetTitleObserver(setId) {
        const el = document.getElementById('sec-' + setId);
        if(!el) return;
        
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    document.querySelectorAll('.set-icon-card').forEach(c => c.classList.remove('active'));
                    document.getElementById('thumb-' + setId)?.classList.add('active');
                }
            });
        }, { threshold: 0.05 });
        obs.observe(el);
    }

    // 5. 상세페이지 오픈 로직 (현재 로드된 카드 풀 한정으로 스와이프 인터랙션 구현)
    function openDetail(idx) {
        currentIdx = idx;
        const swiper = document.getElementById('detail-view');
        swiper.classList.add('open');
        document.body.style.overflow = 'hidden';

        const swiperContainer = document.getElementById('detail-swiper');
        swiperContainer.innerHTML = '';

        masterCards.forEach((card) => {
            const slide = document.createElement('div');
            slide.className = 'detail-slide';
            const imgUrl = card.image_large || card.image_small || 'https://via.placeholder.com/350x490?text=No+Image';
            slide.innerHTML = `<img src="${imgUrl}" alt="large-card">`;
            swiperContainer.appendChild(slide);
        });

        const clientWidth = window.innerWidth;
        swiperContainer.scrollLeft = idx * clientWidth;

        updateDetailInfo(idx);
    }

    function handleSwiperScroll() {
        const swiperContainer = document.getElementById('detail-swiper');
        const clientWidth = window.innerWidth;
        const newIdx = Math.round(swiperContainer.scrollLeft / clientWidth);
        
        if (newIdx !== currentIdx && newIdx >= 0 && newIdx < masterCards.length) {
            currentIdx = newIdx;
            updateDetailInfo(currentIdx);
        }
    }

    function updateDetailInfo(idx) {
        const card = masterCards[idx];
        document.getElementById('detail-count').innerText = `${idx + 1} / ${masterCards.length}`;
        document.getElementById('detail-name').innerText = card.name || '이름 없음';

        let infoHtml = `
            <div class="info-row"><span>ID</span> <span>${card.id}</span></div>
            <div class="info-row"><span>Number</span> <span>${card.number || 'N/A'}</span></div>
            <div class="info-row"><span>Supertype</span> <span>${card.supertype || 'N/A'}</span></div>
            <div class="info-row"><span>HP</span> <span>${card.hp || 'N/A'}</span></div>
            <div class="info-row"><span>Rarity</span> <span>${card.rarity || 'N/A'}</span></div>
            ${card.regulationMark ? `<div class="info-row"><span>Regulation</span> <span>${card.regulationMark}</span></div>` : ''}
            ${card.artist ? `<div class="info-row"><span>Artist</span> <span>${card.artist}</span></div>` : ''}
            ${card.flavorText ? `<div style="margin-top:15px; padding:10px; background:rgba(255,255,255,0.03); border-radius:8px; font-size:0.85rem; font-style:italic;">${card.flavorText}</div>` : ''}
        `;
        
        const infoSheet = document.getElementById('detail-info');
        infoSheet.innerHTML = infoHtml;
        document.querySelector('.detail-info-sheet').scrollTop = 0;
    }

    function closeDetail() {
        document.getElementById('detail-view').classList.remove('open');
        document.body.style.overflow = '';
    }

    init();
</script>
</body>
</html>
